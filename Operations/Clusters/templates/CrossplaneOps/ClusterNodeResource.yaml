apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xclusternodes.resolvemy.host
spec:
  group: resolvemy.host

  names:
    kind: XClusterNode
    plural: xclusternodes

  claimNames:
    kind: ClusterNode
    plural: clusternodes

  connectionSecretKeys:
    - talosconfig

  versions:
    - name: {{ .Values.clusterNodes.version }}
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                name:
                  type: string
                  description: Friendly name of the cluster node

                description:
                  type: string
                  description: Additonal notes and description about the deployed cluster node

                type:
                  type: string
                  default: controlplane
                  enum:
                    - worker
                    - controlplane

                metadata:
                  type: object

                  description: Additonal relevant metadata and regional details for the cluster node

                  properties:
                    rack:
                      type: string


                danger:
                  type: object

                  description: This is the section that controls dangerous server actions beware

                  properties:
                    warningdonotdounlessyouknowwhatyouaredoing:
                      type: object

                      description: If you have come this far traveler you must be careful

                      properties:
                        wipeOnReboot:
                          type: boolean

                          description: Wipe the server on the next reboot by adding the reset kernel parameter

                          default: false


                bgp:
                  type: object

                  description: BGP configurations for the nodes

                  properties:
                    instances:
                      type: array

                      items:
                        type: object

                        description: Configuration of a BGP Instance configured on each cluster node

                        required:
                          - name
                          - asn
                          - peers

                        properties:
                          asn:
                            type: integer

                            description: BGP ASN for the configured instance

                          name:
                            type: string

                            description: Name of the BGP instance

                          type:
                            type: string
                            default: cilium
                            enum:
                              - cilium
                              - frr

                          port:
                            type: integer

                            description: Port if configured the BGP instance will be connectable vs just outgoing registration/neighbor events

                          peers:
                            type: array

                            description: BGP Peers

                            items:
                              type: object

                              required:
                                - name
                                - address
                                - asn

                              properties:
                                name:
                                  type: string
                              
                                  description: Name used to differenticate between peers in statuses and references for other configuration

                                address:
                                  type: string

                                  description: IPv4 or IPv6 address of the peer to connect to

                                localAddress:
                                  type: string

                                  description: Local Address IPv4 or IPv6 interface address used to connect to the peer from

                                asn:
                                  type: integer

                                  description: ASN of the peer

                # storage:
                #   type: object

                #   description: Configure Compute Node Storage

                #   properties:
                #     systemDisk:

                networking:
                  type: object

                  description: New networking configuration

                  properties:
                    dns:
                      type: object

                      description: DNS Configuration for the compute node

                      properties:
                        servers:
                          type: array

                          description: DNS servers

                          items:
                            type: string


                nics:
                  type: array

                  description: Configuration of physical network interfaces

                  items:
                    type: object

                    oneOf:
                      - required:
                          - macAddress
                          
                      - required:
                          - name

                    properties:
                      macAddress:
                        type: string

                        description: MAC Address of the physical interface
                      
                      name:
                        type: string

                        description: Name of the physical interface

                      rings:
                        type: object

                        properties:
                          tx:
                            type: integer

                            description: Configures the number of TX rings.

                          rx:
                            type: integer

                            description: Configures the number of RX rings.

                networks:
                  type: array

                  # TODO: Setup IPAM and Netbox Crossplane configuration/IaC and eventually Backoffice and stuff to make a real fancy interface and control mechanism

                  description: Network configuration for the compute node

                  minItems: 1

                  items:
                    type: object

                    required:
                      - dns

                    x-kubernetes-validations:
                      - rule: "self.type == 'bridge' ? has(self.members) : !has(self.members)"
                        message: "members is required for bridge networks and forbidden for link networks"

                      - rule: "self.type == 'bridge' ? true : !has(self.stp)"
                        message: "stp may only be set when type is bridge"

                    properties:
                      macAddress:
                        type: string
                        description: MAC Address to assign to the DHCP server configuration
                        nullable: false

                      model:
                        type: string

                        default: legacy

                        enum:
                          - legacy
                          - new

                      type:
                        type: string

                        description: 'Type of network interface to configure bridged, link, or more'

                        default: link

                        enum:
                          - link
                          - bridge
                      
                      stp:
                        type: object

                        properties:
                          enabled:
                            type: boolean

                            description: Enable spanning tree on this bridge

                          mode:
                            type: string

                            description: Mode of spanning tree support on this bridge

                            enum:
                              - stp

                              #
                              # TODO: Roll out MSTPD System containers
                              #
                              - rstp

                      members:
                        type: array

                        description: Array of links to add to the bridge

                        items:
                          type: object

                          oneOf:
                            - required:
                                - macAddress
                                
                            - required:
                                - name

                          properties:
                            name:
                              type: string

                              description: Name of the network link to add to the bridge

                            macAddress:
                              type: string

                              description: MAC Address to match to find the bridge member

                      
                      #
                      # TODO: Figure out a better layout for this
                      #
                      bridge:
                        type: boolean
                        description: Configure this interface as part of a bridge <THIS WILL BE REPLACED WITH SOMETHING BETTER SOON>

                        default: false

                      #
                      # TODO: Major refactor of this in the future
                      #
                      routing:
                        type: object

                        description: Configure Routing protocols per interface

                        properties:
                          bgp:
                            type: object

                            description: Configure interface BGP params

                            properties:
                              enabled:
                                type: boolean
                                description: Enable BGP peering with this interface

                                default: false                                

                          ospf:
                            type: object

                            description: Configure OSPF on this interface

                            properties:
                              enabled:
                                type: boolean
                                description: Enable OSPF on this interface

                                default: false

                              type:
                                type: string
                                default: broadcast
                                enum:
                                  - broadcast
                                  - point-to-point
                              
                              area:
                                type: string

                                description: OSPF Area

                                default: '0.0.0.0'


                      vlans:
                        type: array

                        description: Array of VLANs

                        items:
                          type: object

                          properties:
                            vlanID:
                              type: integer
                              
                              description: VLAN ID

                            gateway:
                              type: string

                              description: IPv4 or IPv6 Address to set as the next hop for this interface, may be emtpy to create a link scope route

                      vip:
                        type: string
                        description: Virtual IP Address configuration for interface
                        nullable: true

                      addresses:
                        type: array

                        description: Array of IPv4 and IPv6 networks in subnet notation

                        items:
                          type: string

                      routes:
                        type: array

                        items:
                          type: object

                          properties:
                            network:
                              type: string
                              
                              description: Subnet notation IPv4 or IPv6 network to set for this interface route

                            gateway:
                              type: string

                              description: IPv4 or IPv6 Address to set as the next hop for this interface, may be emtpy to create a link scope route

                            metric:
                              type: integer

                              description: Route Metric to set for this route

                              default: 1024

                      ipAddress:
                        type: string
                        description: deprecated removing soon Network configuration for the compute node
                        nullable: true

                      gateway:
                        type: string
                        description: deprecated removing soon Network gateway/router of the compute node network
                        nullable: true

                      static:
                        type: boolean

                        description: defaults to true Configure the network settings as static on the host and kernel params auto configure from DHCP

                        default: true

                      mtu:
                        type: integer
                        description: Network Interface MTU
                        default: 9000

                        maximum: 9000
                        minimum: 0

                      dns:
                        type: array
                        description: DNS Servers for the DHCP server to assign to the compute node
                        nullable: false
                        maxItems: 3

                        items:
                          type: string


                tenantRef:
                  type: object
                  description: Tenant ref to attach details to the deployed cluster node
                  required:
                    - name
                  
                  properties:
                    group:
                      type: string

                      default: {{ .Values.tenant.group }}

                      nullable: false


                    kind:
                      type: string

                      default: {{ .Values.tenant.kind }}

                      nullable: false

                    name:
                      type: string

                    namespace:
                      type: string
                      nullable: true

                clusterRef:
                  type: object
                  description: Cluster ref to attach details to the deployed cluster node
                  required:
                    - name

                  properties:
                    group:
                      type: string

                      default: {{ .Values.cluster.group }}

                      nullable: false


                    kind:
                      type: string

                      default: {{ .Values.cluster.kind }}

                      nullable: false

                    name:
                      type: string

                      nullable: false

                    namespace:
                      type: string

                environment:
                  type: string
                  description: env of the deployed cluster node
                  default: testing

                  nullable: false

                watchdog:
                  type: object
                  description: Configuration of Watchdog timers

                  properties:
                    enabled:
                      type: boolean

                      description: Enable or disable the hardware watchdog

                    devicePath:
                      type: string

                      description: Device path of the watchdog

                    timeout:
                      type: string

                      description: Timeout duration of the watchdog

                      default: 5m

                
                sysctls:
                  type: array
                  description: Configure Kernel Sysctls for the Compute Node

                  items:
                    type: object

                    properties:
                      name:
                        type: string

                        description: Linux sysctl to configure

                      value:
                        type: string

                        description: Value to set
                    required:
                      - name
                      - value

                overrides:
                  type: object 

                  description: Override the existing variables and configuration used by the BMPS

                  properties:
                    etcd:
                      type: object

                      properties:
                        extraArgs:
                          type: object

                          description: Etcd Configuration for the node

                          additionalProperties:
                            type: string
                          

                    cni:
                      type: object

                      descriptions: Overrides for specific Container Network Interface configurations and parameters at the node level

                      properties:
                        cilium:
                          type: object

                          description: Override configurations for the Cilium CNI

                          properties:
                            networkInterfaces:
                              type: array

                              description: Network interfaces to be passed to the cilium "Devices" configuration option (See cilium documenation for further context)

                              items:
                                type: string

                    kernel:
                      type: object
                      description: Override Linux kerenel configuration

                      properties:
                        parameters:
                          type: array
                          description: Configure Kernel params at boot for the Compute Node

                          items:
                            type: object

                            properties:
                              name:
                                type: string

                                description: Linux kernel param to configure

                              value:
                                type: string

                                description: Value to set

                            required:
                              - name
                              - value
                    pxe:
                      type: object
                      description: Override the automated iPXE Settings

                      properties:
                        script:
                          type: string

                          description: iPXE Script provided to the client

                    pci:
                      type: object
                      description: Override PCIe devices and rebinds
                      properties:
                        rebinds:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: string
                                description: PCI Device ID

                              driver:
                                type: string
                                description: Driver to rebind the PCI device to

                              description:
                                type: string
                                description: Description of bind

                            required:
                              - id
                              - driver

                    
                    talos:
                      type: object

                      description: Override Talos configurations and features
                      
                      properties:
                        kernel:
                          type: object
                          description: Kernel configuration applied to the talos node

                          properties:
                            modules:
                              type: array

                              description: Array of the name of kernel modules to load

                              items:
                                type: object

                                properties:
                                  name:
                                    type: string

                                    description: Kernel module to load

                        extensions:
                          type: object

                          description: Add or remove (TODO ADD Remove) Talos exensions

                          properties:
                            system:
                              type: array

                              description: Array of the name of Talos system extensions to add

                              items:
                                type: string

              required:
                - name
                - networks
                - tenantRef
                - clusterRef

            status:
              description: A Status represents the observed state
              properties:
                share:
                  description: Freeform field containing status information
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
              type: object