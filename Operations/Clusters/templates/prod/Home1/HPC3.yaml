apiVersion: resolvemy.host/v1alpha1
kind: ClusterNode
metadata:
  name: hpc3.home1.yvr.resolvemy.host

  namespace: core-prod

  labels:
    argocd.argoproj.io/instance: dc1-k3s-node1-ops-cluster

spec:
  name: hpc3.home1.yvr.resolvemy.host

  description: home1.yvr.resolvemy.host iMac

  type: worker

  danger:
    warningdonotdounlessyouknowwhatyouaredoing:
      wipeOnReboot: false

  clusterRef:
    group: resolvemy.host
    kind: Cluster
    name: core-home1-talos
    namespace: core-prod

  tenantRef:
    group: mylogin.space
    kind: Tenant
    name: core.mylogin.space
    namespace: core-prod

  environment: prod

  bgp:
    instances:
      - asn: 64512
        name: wan-gw
        type: cilium
        peers:
          - address: 172.31.193.16
            localAddress: 172.31.193.21
            asn: 64567
            name: cpe-sw1.home1.yvr.resolvemy.host

          - address: 2604:3D08:D174:2000::1C
            asn: 64567
            localAddress: 2604:3d08:d174:2000::22
            name: ipv6.cpe-sw1.home2.yvr.resolvemy.host
  
  nics:
    - macAddress: 38:c9:86:42:ff:90
      rings:
        rx: 400

    - macAddress: 00:30:93:0c:05:12
      rings:
        rx: 4096
        tx: 4096
  networks:
    - macAddress: 38:c9:86:42:ff:90
      bridge: false

      model: new

      addresses:
        - 172.31.193.21/24

      routes:
        - gateway: 172.31.193.254
          metric: 1024
          network: 0.0.0.0/0

      mtu: 9000
      routing:
        ospf:
          area: 0.0.0.0
          enabled: false
          type: broadcast

      type: link

      static: true
      dns:
        - 1.1.1.1

    - type: link
      model: new

      macAddress: 00:30:93:0c:05:12
      bridge: false

      addresses:
        - 172.31.193.22/24
        - 2604:3d08:d174:2000::22/122

      routes:
        - gateway: 2604:3D08:D174:2000::1C
          metric: 1024
          network: ::/0


      mtu: 9000
      routing:
        ospf:
          area: 0.0.0.0
          enabled: false
          type: broadcast
      static: true
      dns:
        - 1.1.1.1

    - type: bridge
      
      stp:
        enabled: false

      members:
        - macAddress: 00:30:93:0c:05:13

      addresses:
        - 172.31.241.26/30

      model: new
      bridge: true
      dns:
        - 1.1.1.1
        - 1.0.0.1
        - 8.8.8.8
      macAddress: 00:30:93:0c:05:13
      mtu: 9000
      routes: []
      static: true
      routing:
        ospf:
          area: 0.0.0.0
          enabled: true
          type: point-to-point
  
  sysctls:
    - name: net.ipv4.tcp_max_syn_backlog
      value: '262144'

  sysfs:
    - name: class.net.enp34s0f0.device.sriov_numvfs
      value: '8'

  overrides:
    version:
      talos: v1.12.7

    kernel:
      parameters:
        - name: intel_iommu
          value: 'on'

        - name: iommu
          value: pt

        - name: console
          value: tty0

        - name: pci
          value: realloc

        - name: loglevel
          value: '7'

        - name: ignore_loglevel
          value: ''

        - name: nomodeset
          value: ''

        - name: intel_iommu
          value: 'off'

        - name: iommu
          value: pt

    pci:
      rebinds:
        - description: WiFi Card
          id: 0000:03:00.0
          driver: vfio-pci

        - description: enp4s0f0
          id: 0000:23:10.0
          driver: vfio-pci

        - description: enp4s0f0.2
          id: 0000:23:10.2
          driver: vfio-pci
    talos:
      kernel:
        modules:
          - name: vfio-pci
          - name: dm_multipath
          - name: dm_round-robin

      extensions:
        system:
          - intel-ucode
          - thunderbolt
          - amdgpu
          - nfsd
          - multipath-tools
          - mdadm
          - ctr
          - nfsrahead
          - uinput
          - nvme-cli
          - usb-audio-drivers
