apiVersion: resolvemy.host/v1alpha1
kind: ClusterNode
metadata:
  name: srv2.home1.yvr.resolvemy.host

  namespace: core-prod

spec:
  name: srv2.home1.yvr.resolvemy.host

  description: home2.yvr.resolvemy.host Rack mount server2

  type: worker

  danger:
    warningdonotdounlessyouknowwhatyouaredoing:
      wipeOnReboot: false

  clusterRef:
    group: resolvemy.host
    kind: Cluster
    name: core-home1-talos
    namespace: core-prod

  tenantRef:
    group: mylogin.space
    kind: Tenant
    name: core.mylogin.space
    namespace: core-prod

  environment: prod

  bgp:
    instances:
      - asn: 64512
        name: wan-gw
        peers:
          - address: 2604:3d08:d174:2000::1C
            asn: 64567
            localAddress: 2604:3d08:d174:2000::26
            name: ipv6.cpe-sw1.home2.yvr.resolvemy.host

  networks:
    - macAddress: 24:6e:96:38:84:60
      bridge: true
      model: legacy
      addresses:
        - 172.31.193.36/24
        - 2604:3d08:d174:2000::26/122

      routing:
        ospf:
          enabled: true

          area: '0.0.0.0'

          type: broadcast

      routes:
        - network: 0.0.0.0/0
          gateway: 172.31.193.254
          metric: 1024

        - network: '::/0'
          gateway: 2604:3d08:d174:2000::1C
          metric: 1024

      mtu: 9000

      static: true
      dns:
        - 172.31.193.254
        - 172.31.193.2
        - 172.31.193.3

      vlans:
        - vlanID: 150
        - vlanID: 30

    - addresses:
        - 172.31.241.34/30
      bridge: false
      dns:
        - 172.31.193.254
      macAddress: 7c:fe:90:ae:46:40
      model: legacy
      mtu: 9000
      routing:
        bgp:
          enabled: true
      static: true
      type: link

    - addresses:
        - 172.31.241.25/30
      bridge: true

      type: bridge

      stp:
        enabled: false

      members:
        - macAddress: 24:6e:96:38:84:62

      dns:
        - 172.31.193.254

      macAddress: 24:6e:96:38:84:62
      model: new

      mtu: 9000

      routing:
        ospf:
          enabled: true

          area: '0.0.0.0'

          type: broadcast

      static: true

  sysctls:
    - name: net.ipv6.conf.br0.accept_ra
      value: '2'

  overrides:
    kernel:
      parameters:
        - name: cpufreq.default_governor
          value: performance

        - name: intel_iommu
          value: 'on'

        - name: iommu
          value: pt

        - name: intel_pstate
          value: active

        - name: pcie_aspm
          value: 'off'

        - name: nvme_core.default_ps_max_latency_us
          value: '0'

        - name: intel_idle.max_cstate
          value: '0'

        - name: processor.max_cstate
          value: '1'
    talos:
      extensions:
        system:
          - intel-ucode
          - nfsd