apiVersion: resolvemy.host/v1alpha1
kind: ClusterNode
metadata:
  name: hpc2.home1.yvr.resolvemy.host

  namespace: core-prod

  labels:
    argocd.argoproj.io/instance: dc1-k3s-node1-ops-cluster

spec:
  name: hpc2.home1.yvr.resolvemy.host

  description: home1.yvr.resolvemy.host Desktop PC Gaming Desktop

  type: controlplane

  danger:
    warningdonotdounlessyouknowwhatyouaredoing:
      wipeOnReboot: false

  clusterRef:
    group: resolvemy.host
    kind: Cluster
    name: core-home1-talos
    namespace: core-prod

  tenantRef:
    group: mylogin.space
    kind: Tenant
    name: core.mylogin.space
    namespace: core-prod

  environment: prod

  bgp:
    instances:
      - asn: 64512
        name: wan-gw
        port: 1176
        type: cilium
        peers:
          - address: 172.31.193.16
            asn: 64567
            localAddress: 172.31.193.11
            name: cpe-sw1.home1.yvr.resolvemy.host

          - address: 2604:3D08:D174:2000::1C
            asn: 64567
            localAddress: 2604:3d08:d174:2000::11
            name: ipv6.cpe-sw1.home2.yvr.resolvemy.host

  networking:
    dns:
      servers:
        - 10.1.1.53
        - 172.31.193.254

  networks:
    - addresses:
        - 172.31.193.11/24
        - 2604:3d08:d174:2000::11/122
      bridge: false
      dns:
        - 1.1.1.1
        - 1.0.0.1
        - 8.8.8.8
      macAddress: e0:d5:5e:65:02:d7
      model: new
      mtu: 9000
      routes:
        - gateway: 172.31.193.254
          metric: 600
          network: 0.0.0.0/0

        - gateway: 2604:3D08:D174:2000::1C
          metric: 600
          network: '::/0'
      routing:
        ospf:
          area: 0.0.0.0
          enabled: false
          type: broadcast
      static: true
      type: link

    - macAddress: e0:d5:5e:65:02:d9
      type: link
      bridge: false

      addresses:
        - 2604:3d08:d174:2000::12/122

      model: new

      dns:
        - 1.1.1.1
        - 8.8.8.8

      mtu: 9000

      routes: []

      routing:
        ospf:
          area: 0.0.0.0
          enabled: true
          type: broadcast

      static: true

  nics:
    - macAddress: e0:d5:5e:65:02:d7
      rings:
        rx: 2048
        tx: 2048

  sysctls:
    - name: net.core.bpf_jit_harden
      value: '1'

    - name: net.ipv6.conf.eno1.accept_ra
      value: '2'

    - name: net.ipv4.tcp_max_syn_backlog
      value: '262144'

  overrides:
    kernel:
      parameters:
        - name: cpufreq.default_governor
          value: performance

        - name: intel_iommu
          value: 'on'

        - name: iommu
          value: pt

        - name: intel_pstate
          value: active

        - name: pcie_aspm
          value: 'off'

        - name: nvme_core.default_ps_max_latency_us
          value: '0'
    talos:
      extensions:
        system:
          - intel-ucode
          - i915
          - thunderbolt
          - intel-ice-firmware
          - nfsd
          - multipath-tools
          - mdadm
          - ctr
          - nfsrahead
          - uinput
          - nvme-cli
          - usb-audio-drivers
      kernel:
        modules:
          - name: dm_multipath
          - name: dm_round-robin
          - name: it87