apiVersion: resolvemy.host/v1alpha1
kind: ClusterNode
metadata:
  name: srv1.home1.yvr.resolvemy.host

  namespace: core-prod

  labels:
    argocd.argoproj.io/instance: dc1-k3s-node1-ops-cluster

spec:
  name: srv1.home1.yvr.resolvemy.host

  description: home1.yvr.resolvemy.host Rack mount server

  type: controlplane

  danger:
    warningdonotdounlessyouknowwhatyouaredoing:
      wipeOnReboot: false

  clusterRef:
    group: resolvemy.host
    kind: Cluster
    name: core-home1-talos
    namespace: core-prod

  tenantRef:
    group: mylogin.space
    kind: Tenant
    name: core.mylogin.space
    namespace: core-prod

  environment: prod

  bgp:
    instances:
      - asn: 64512
        name: wan-gw
        peers:
          - address: 172.31.193.2
            asn: 64567
            name: eth1.vyos-lab1.home2.yvr.resolvemy.host

          - address: 172.31.193.16
            asn: 64567
            name: vlan1.cpe-sw1.home2.yvr.resolvemy.host

  networks:
    - macAddress: f8:0f:41:f4:d2:81
      bridge: true
      vip: 172.31.192.9
      addresses:
        - 172.31.192.31/24
      routing:
        ospf:
          enabled: true

          area: '0.0.0.0'

          type: broadcast

      routes:
        - gateway: 172.31.193.254
          metric: 600
          network: 0.0.0.0/0

      mtu: 1500

      static: true
      dns:
        - 1.1.1.1
        - 1.0.0.1
        - 8.8.8.8

    - addresses:
        - 172.31.192.34/24
      bridge: true
      routing:
        ospf:
          enabled: true

          area: '0.0.0.0'

          type: broadcast

      dns:
        - 1.1.1.1
        - 1.0.0.1
        - 8.8.8.8
      macAddress: f8:0f:41:f4:d2:82
      mtu: 9000
      routes:
        - gateway: 172.31.193.254
          metric: 600
          network: 0.0.0.0/0
      static: true

    - macAddress: f8:0f:41:f4:d2:83
      bridge: true
      addresses:
        - 172.31.192.35/24

      routing:
        ospf:
          enabled: true

          area: '0.0.0.0'

          type: broadcast

      mtu: 9000

      static: true
      dns:
        - 1.1.1.1
        - 1.0.0.1
        - 8.8.8.8

  overrides:
    talos:
      extensions:
        system:
          - intel-ucode
          - realtek-firmware
          - nfsd
          - multipath-tools
          - nfs-utils
          - mdadm
          - ctr
          - nfsrahead
          - uinput
          - nvme-cli
      kernel:
        modules:
          - name: dm_multipath
          - name: dm_round-robin