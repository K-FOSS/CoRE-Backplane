      bridge: true
      addresses:
        - 172.31.241.90/30

      routes:
        - network: 0.0.0.0/0
          gateway: 172.31.241.89
          metric: 1024

      mtu: 9000

      routing:
        ospf:
          enabled: true

          type: point-to-point

          area: '0.0.0.0'

      static: true
      dns:
        - 1.1.1.1
        - 1.0.0.1
        - 8.8.8.8

      vlans:
        - vlanID: 15
        - vlanID: 951
        

