apiVersion: resolvemy.host/v1alpha1
kind: ClusterNode
metadata:
  name: srv3.dc1.yxl.resolvemy.host

  namespace: core-prod

  labels:
    argocd.argoproj.io/instance: dc1-k3s-node1-ops-cluster

spec:
  name: core-dc1-talos

  description: Main cluster

  type: controlplane

  danger:
    warningdonotdounlessyouknowwhatyouaredoing:
      wipeOnReboot: false

  clusterRef:
    group: resolvemy.host
    kind: Cluster
    name: core-dc1-talos
    namespace: core-prod

  tenantRef:
    group: mylogin.space
    kind: Tenant
    name: core.mylogin.space
    namespace: core-prod

  environment: prod

  bgp:
    instances:
      - asn: 64512
        name: wan-gw
        type: cilium
        peers:
          - address: 172.31.241.89
            localAddress: 172.31.241.90
            asn: 64567
            name: eth1-29.lf-sw1.dc1.yxl.resolvemy.host#

  nics:
    - macAddress: b8:ca:3a:6c:33:69
      rings:
        rx: 2048

#   storage:
#     longhornDisks:
#       - maxSize: 500GB
#         selector:
#           wwid: naa.5000cca072403d08

  networks:
    - addresses:
        - 172.31.241.90/30
      bridge: false
      dns:
        - 1.1.1.1
      macAddress: b8:ca:3a:6c:33:68
      model: new
      mtu: 3000
      routes:
        - gateway: 172.31.241.89
          metric: 1024
          network: 0.0.0.0/0
      routing:
        ospf:
          area: 0.0.0.0
          enabled: false
          type: point-to-point
      static: true
      type: link

    - addresses: []
      bridge: false
      dns:
        - 1.1.1.1
        - 1.0.0.1
        - 8.8.8.8
      macAddress: b8:ca:3a:6c:33:69
      model: new
      mtu: 9216
      routes: []
      routing:
        ospf:
          area: 0.0.0.0
          enabled: false
          type: point-to-point
      static: true
      type: link

  overrides:
    pci:
      rebinds:
        - description: eno2
          id: 0000:01:10.1
          driver: vfio-pci

    talos:
      extensions:
        system:
          - intel-ucode

    kernel:
      parameters:
        - name: intel_iommu
          value: 'on'

        - name: iommu
          value: pt

        - name: pcie_aspm
          value: 'off'

        - name: numa_balancing
          value: enable