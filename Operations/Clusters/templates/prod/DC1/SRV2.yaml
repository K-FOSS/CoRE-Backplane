apiVersion: resolvemy.host/v1alpha1
kind: ClusterNode
metadata:
  name: srv2.dc1.yxl.resolvemy.host

  namespace: core-prod

  labels:
    argocd.argoproj.io/instance: dc1-k3s-node1-ops-cluster

spec:
  name: core-dc1-talos

  description: Main cluster

  type: worker

  danger:
    warningdonotdounlessyouknowwhatyouaredoing:
      wipeOnReboot: false

  clusterRef:
    group: resolvemy.host
    kind: Cluster
    name: core-dc1-talos
    namespace: core-prod

  tenantRef:
    group: mylogin.space
    kind: Tenant
    name: core.mylogin.space
    namespace: core-prod

  environment: prod

  bgp:
    instances:
      - asn: 64512
        name: wan-gw
        type: cilium
        peers:
          - address: 172.31.241.21
            localAddress: 172.31.241.22
            asn: 64567
            name: vlan2021.spine-sw1.dc1.yxl.resolvemy.host

#   nics:
#     - macAddress: f0:4d:a2:03:cd:ea
#       rings:
#         rx: 4096

#   storage:
#     longhornDisks:
#       - maxSize: 500GB
#         selector:
#           wwid: naa.5000cca072403d08

  networks:
    - macAddress: b8:CA:3A:F6:51:3E
      bridge: true
      model: new
      type: link
      addresses:
        - 172.31.241.22/30

      routes:
        - network: 0.0.0.0/0
          gateway: 172.31.241.21
          metric: 1024

      mtu: 3000

      routing:
        ospf:
          enabled: false

      static: true
      dns:
        - 1.1.1.1
        - 1.0.0.1
        - 8.8.8.8

  overrides:
    talos:
      extensions:
        system:
          - intel-ucode

    kernel:
      parameters:
        - name: intel_iommu
          value: 'on'

        - name: iommu
          value: pt

        - name: cpufreq.default_governor
          value: performance

        - name: intel_idle.max_cstate
          value: '0'

        - name: processor.max_cstate
          value: '1'

        - name: numa_balancing
          value: enable