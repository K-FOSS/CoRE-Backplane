apiVersion: kubevirt.io/v1
kind: KubeVirt
metadata:
  name: kubevirt
  namespace: kubevirt
spec:
  configuration:
    permittedHostDevices:
      pciHostDevices:
        - pciVendorSelector: '1002:6920'
          resourceName: 'amd.com/amethyst-gpu'
        - pciVendorSelector: '1002:aad8'
          resourceName: 'amd.com/amethyst-audio'
    developerConfiguration:
      featureGates:
        - LiveMigration
        - NetworkBindingPlugins
        - ExpandDisks
        - VideoConfig
    smbios:
      sku: "TalosCloud"
      version: "v0.1.0"
      manufacturer: "Talos Virtualization"
      product: "talosvm"
      family: "ccio"
  workloadUpdateStrategy:
    workloadUpdateMethods:
      - LiveMigrate