apiVersion: pkg.crossplane.io/v1beta1
kind: DeploymentRuntimeConfig
metadata:
  name: provider-terraform
spec:
  deploymentTemplate:
    metadata:
      labels:
        logs: loki-myloginspace
    spec:
      selector: {}
      template:
        spec:
          volumes:
            - name: terraform-plugin-cache
              emptyDir:
                medium: Memory
                sizeLimit: 8Gi
          containers:
            - name: package-runtime
              args:
                - -d
                - --log-encoding=json
                - --sync=2h
                - --poll=30m
                - --poll-jitter=15m
              env:
                - name: TF_PLUGIN_CACHE_DIR
                  value: /tf/plugin-cache
              volumeMounts:
                - name: terraform-plugin-cache
                  mountPath: /tf/plugin-cache
---
apiVersion: pkg.crossplane.io/v1
kind: Provider
metadata:
  name: provider-terraform

  annotations:
    argocd.argoproj.io/sync-wave: '20'

spec:
  # TODO: Get this automated with Renovate
  package: registry.writemy.codes/library/terraform:v0.20.1
  runtimeConfigRef:
    name: provider-terraform