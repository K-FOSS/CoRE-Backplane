apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: core-backplane-aaa-deploy
  namespace: argocd

  annotations:
    argocd.argoproj.io/sync-wave: '20'

spec:
  goTemplate: true
  # goTemplateOptions:
  #   - 'missingkey=error'
  generators:
    - merge:
        mergeKeys:
          - name

        generators:
          - list:
              elements:
                - name: dc1-k3s-node1
                  values:
                    hub: false

                - name: core-dc1-talos-prod
                  values:
                    hub: true

                - name: core-home1-talos-prod
                  values:
                    hub: false

          - clusters:
              selector:
                matchLabels:
                  mylogin.space/tenant: 'core.mylogin.space'
                  resolvemy.host/computetype: 'baremetal'
              values:
                clusterName: '{{ .name }}'
                environment: 'prod'
                clusterDomain: '{{ index .metadata.labels "cluster.kubernetes.io/domain" }}'
                tenant: '{{ index .metadata.labels "mylogin.space/tenant" }}'
                region: '{{ index .metadata.labels "topology.kubernetes.io/region" }}'
                zone: '{{ index .metadata.labels "topology.kubernetes.io/zone" }}'
                datacenter: '{{ index .metadata.labels "resolvemy.host/dc" }}'

  syncPolicy:
    preserveResourcesOnDeletion: true
  
  template:
    metadata:
      name: '{{ .values.clusterName }}-aaa-{{ .values.environment }}'
    
      annotations:
        argocd.argoproj.io/manifest-generate-paths: /AAA

      labels:
        resolvemy.host/env: '{{ .values.environment }}'
        resolvemy.host/priority: 'critical'

    spec:
      project: core
      syncPolicy:
        syncOptions:
          - ServerSideApply=true

      source:
        path: AAA
        repoURL: https://github.com/K-FOSS/CoRE-Backplane.git
        targetRevision: HEAD

        plugin:
          name: argocd-lovely-plugin
          env:
            - name: LOVELY_HELM_MERGE
              value: |- # yaml
                env: '{{ .values.environment }}'

                datacenter: {{ .values.datacenter }}

                region: {{ .values.region }}

                hub: {{ .values.hub }}

                cluster:
                  name: {{ .values.clusterName }}
                  domain: {{ .values.clusterDomain }}

                authentik:
                  authentik:
                    postgresql:
                      # -- set the postgresql hostname to talk to
                      # if unset and .Values.postgresql.enabled == true, will generate the default
                      # @default -- `{{ .Release.Name }}-postgresql`
                      host: psql-int.mylogin.space
                      port: 5432
                  
                  server:
                    service:
                      annotations:
                        external-dns.alpha.kubernetes.io/hostname: aaa-server.{{ .values.clusterName }}.{{ .values.datacenter }}.{{ .values.region }}.mylogin.space
                      # -- authentik server service labels
                      labels:
                        wan-mode: public
                  global:
                    additionalLabels:
                      resolvemy.host/env: '{{ .values.environment }}'
                      resolvemy.host/priority: 'critical'

                  worker:
                    # Authentik names discovered Kubernetes TLS Secrets after
                    # the parent directory containing tls.crt and tls.key.
                    # Use the cluster name except for dc1 Talos, whose
                    # established Authentik certificate name is "tls".
                    volumeMounts:
                      - name: tls-certs
                        mountPath: /certs
                        readOnly: true

                    volumes:
                      - name: tls-certs
                        projected:
                          sources:
                            - secret:
                                name: myloginspace-default-certificates
                                items:
                                  - key: tls.crt
                                    {{ if eq .values.clusterName "core-dc1-talos-prod" }}
                                    path: tls/tls.crt
                                    {{ else }}
                                    path: '{{ .values.clusterName }}/tls.crt'
                                    {{ end }}
                                  - key: tls.key
                                    {{ if eq .values.clusterName "core-dc1-talos-prod" }}
                                    path: tls/tls.key
                                    {{ else }}
                                    path: '{{ .values.clusterName }}/tls.key'
                                    {{ end }}

      destination:
        server: '{{ .server }}'
        namespace: core-{{ .values.environment }}
