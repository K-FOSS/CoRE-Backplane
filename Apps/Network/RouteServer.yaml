
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: core-backplane-routeserver
  namespace: argocd
spec:
  goTemplate: true
  # goTemplateOptions:
  #   - 'missingkey=error'
  generators:
    - merge:
        mergeKeys:
          - name

        generators:
          - list:
              elements:
                - name: core-dc1-talos-prod
                  values:
                    hub: false
                    routeservers:
                      rs0:
                        ipAddress: 10.1.1.180

                        networking:
                          sriov:
                            enabled: true
                            vlan: 666
                            address: 10.7.7.61
                            gateway: 10.7.7.1
                            device: mellanox.com/mlx4_cx3_netdevice

                        bgp:
                          enabled: true

                          peers:
                            - address: 172.31.255.1
                              softReconfiguration: true
                              peerGroup: WAN-RT

                          peerGroups:
                            - name: spine-sw1
                              asn: 6456
                        frr:
                          version: '10.5.0'

                - name:  core-home1-talos-prod
                  values:
                    hub: false
                    routeservers:
                      rs0:
                        ipAddress: 10.1.1.181
                        networking:
                          sriov:
                            enabled: true
                            vlan: 50
                            address: 172.31.245.2/29
                            gateway: 172.31.245.1
                            device: intel.com/intel_x540_netdevice

                        ospf:
                          enabled: true
                          autocost:
                            refBandwidth: 100000

                        bgp:
                          enabled: true
                          asn: 64567
                          afi:
                            ipv4:
                              unicast:
                                maximum-paths:
                                  base: 4
                                  ibgp: 4

                                neighbor:
                                  - name: cpe-sw
                                    action: activate
                          peers:
                            - address: 172.29.255.3
                              softReconfiguration: true
                              peerGroup: cpe-sw

                          peerGroups:
                            - name: cpe-sw
                              asn: 64567

                        frr:
                          version: '10.5.0'

                - name: dc1-k3s-node1
                  values:
                    hub: false
                    routeservers:
                      rs0:
                        ipAddress: 10.1.1.179
                        networking:
                          sriov:
                            enabled: true
                            vlan: 666
                            address: 10.7.7.33/24
                            gateway: 10.7.7.1
                            device: intel.com/intel_xxv710_port0

                        bgp:
                          enabled: true
                          peers:
                            - address: 172.31.255.1
                              softReconfiguration: true
                              peerGroup: spine-sw1

                          peerGroups:
                            - name: spine-sw1
                              asn: 64567
                        frr:
                          version: '10.5.0'

          - clusters:
              selector:
                matchLabels:
                  mylogin.space/tenant: 'core.mylogin.space'
                  resolvemy.host/computetype: 'baremetal'
              values:
                clusterName: '{{ .name }}'
                environment: 'prod'
                clusterDomain: '{{ index .metadata.labels "cluster.kubernetes.io/domain" }}'
                tenant: '{{ index .metadata.labels "mylogin.space/tenant" }}'
                region: '{{ index .metadata.labels "topology.kubernetes.io/region" }}'
                zone: '{{ index .metadata.labels "topology.kubernetes.io/zone" }}'
                datacenter: '{{ index .metadata.labels "resolvemy.host/dc" }}'

  template:
    metadata:
      name: '{{ .values.clusterName }}-network-routeserver-{{ .values.environment }}'

      annotations:
        argocd.argoproj.io/manifest-generate-paths: .

    spec:
      project: core

      syncPolicy:
        syncOptions:
          - CreateNamespace=true

      source:
        repoURL: https://github.com/K-FOSS/CoRE-Backplane.git
        path: Network/RouteServer
        targetRevision: main
        plugin:
          name: argocd-lovely-plugin
          env:
            - name: LOVELY_HELM_MERGE
              value: |- # yaml
                env: {{ .values.environment }}

                hub: {{ .values.hub }}

                routeservers:
                {{ nindent 2 (toYaml .values.routeservers) }}

                cluster:
                  name: {{ .values.clusterName }}
                  domain: {{ .values.clusterDomain }}


                datacenter: {{ .values.datacenter }}

                region: {{ .values.region }}


      destination:
        server: '{{ .server }}'
        namespace: core-net-{{ .values.environment }}

