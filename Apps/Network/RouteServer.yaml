
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: core-backplane-routeserver
  namespace: argocd
spec:
  goTemplate: true
  # goTemplateOptions:
  #   - 'missingkey=error'
  generators:
    - merge:
        mergeKeys:
          - name

        generators:
          - list:
              elements:
                - name: core-dc1-talos-prod
                  values:
                    hub: false
                    routeservers:
                      rs0:
                        ipAddress: 172.31.255.111

                        networking:
                          interfaces:
                            - type: sriov
                              mtu: 9216
                              routing:
                                ospf:
                                  enabled: true
                                  area: 0.0.0.0
                                  dead: 300
                              ipam:
                                address: 172.16.51.111/24
                              sriov:
                                vlan: 951
                                device: mellanox.com/mlx4_cx3_netdevice
                        bgp:
                          enabled: true
                          clusterId: 172.31.255.255
                          afi:
                            l2vpn:
                              evpn:
                                neighbor:
                                  - name: spine-sw
                                    action: activate

                                  - name: lf-sw
                                    action: activate

                                  - name: yvr-rrs
                                    action: activate

                                  - name: yxl-rrs
                                    action: activate
                            ipv4:
                              vpn:
                                neighbor:
                                  - name: yvr-rrs
                                    action: activate

                                  - name: yxl-rrs
                                    action: activate

                                  - name: yxl-wan-gw
                                    action: activate
                          peers:
                            - address: 172.31.255.1
                              peerGroup: spine-sw

                            - address: 172.31.255.19
                              peerGroup: lf-sw

                            - address: 172.31.245.2
                              peerGroup: yvr-rrs

                            - address: 172.16.51.100
                              peerGroup: yxl-rrs

                            - address: 172.31.255.5
                              peerGroup: yxl-wan-gw

                          peerGroups:
                            - name: spine-sw
                              asn: 64567

                            - name: lf-sw
                              asn: 64567

                            - name: yxl-wan-gw
                              asn: 64567

                            - name: yvr-rrs
                              asn: 64567

                            - name: yxl-rrs
                              asn: 64567
                        frr:
                          version: '10.6.0'

                - name:  core-home1-talos-prod
                  values:
                    hub: false
                    routeservers:
                      rs0:
                        ipAddress: 172.29.255.100

                        networking:
                          interfaces:
                            - type: sriov
                              mtu: 9000
                              routing:
                                ospf:
                                  enabled: true
                                  area: 0.0.0.0
                                  type: point-to-point
                              ipam:
                                address: 172.31.245.2/29
                                routes:
                                  - dst: 0.0.0.0/0
                                    gw: 172.31.245.1
                              sriov:
                                vlan: 50
                                device: intel.com/intel_x540_netdevice

                        ospf:
                          enabled: true
                          autocost:
                            refBandwidth: 100000

                        bgp:
                          enabled: true
                          clusterId: 172.29.255.1
                          asn: 64567
                          afi:
                            l2vpn:
                              evpn:
                                neighbor:
                                  - name: yxl-rrs
                                    action: activate
                            ipv4:
                              vpn:
                                neighbor:
                                  - name: cpe-sw
                                    action: activate

                                  - name: cpe-sw
                                    action: route-reflector-client
                                  
                                  - name: yxl-rrs
                                    action: activate

                                  - name: yvr-wan-gw
                                    action: activate
                              unicast:
                                maximum-paths:
                                  base: 4
                                  ibgp: 4

                                neighbor:
                                  - name: cpe-sw
                                    action: activate
                                  
                                  - name: cpe-sw
                                    action: route-reflector-client
                          peers:
                            - address: 172.29.255.3
                              softReconfiguration: true
                              peerGroup: cpe-sw

                            - address: 172.16.51.100
                              peerGroup: yxl-rrs

                            - address: 172.16.51.111
                              peerGroup: yxl-rrs

                            - address: 172.29.255.4
                              peerGroup: yvr-wan-gw
                          peerGroups:
                            - name: cpe-sw
                              asn: 64567

                            - name: yvr-wan-gw
                              asn: 64567

                            - name: yxl-rrs
                              asn: 64567
                        frr:
                          version: '10.6.0'

                - name: dc1-k3s-node1
                  values:
                    hub: false
                    routeservers:
                      rs0:
                        ipAddress: 172.31.255.100

                        networking:
                          interfaces:
                            - type: sriov
                              mtu: 9216
                              routing:
                                ospf:
                                  enabled: true
                                  area: 0.0.0.0
                                  dead: 300
                              ipam:
                                address: 172.16.51.100/24
                              sriov:
                                vlan: 951
                                device: intel.com/intel_xxv710_port0

                        bgp:
                          enabled: true
                          clusterId: 172.31.255.255
                          afi:
                            l2vpn:
                              evpn:
                                neighbor:
                                  - name: spine-sw
                                    action: activate

                                  - name: lf-sw
                                    action: activate

                                  - name: yvr-rrs
                                    action: activate

                                  - name: yxl-rrs
                                    action: activate
                            ipv4:
                              vpn:
                                neighbor:
                                  - name: yvr-rrs
                                    action: activate

                                  - name: yxl-rrs
                                    action: activate
                          peers:
                            - address: 172.31.255.1
                              peerGroup: spine-sw

                            - address: 172.31.255.19
                              peerGroup: lf-sw

                            - address: 172.31.245.2
                              peerGroup: yvr-rrs

                            - address: 172.16.51.111
                              peerGroup: yxl-rrs

                          peerGroups:
                            - name: spine-sw
                              asn: 64567

                            - name: lf-sw
                              asn: 64567

                            - name: yvr-rrs
                              asn: 64567

                            - name: yxl-rrs
                              asn: 64567
                        frr:
                          version: '10.6.0'

          - clusters:
              selector:
                matchLabels:
                  mylogin.space/tenant: 'core.mylogin.space'
                  resolvemy.host/computetype: 'baremetal'
              values:
                clusterName: '{{ .name }}'
                environment: 'prod'
                clusterDomain: '{{ index .metadata.labels "cluster.kubernetes.io/domain" }}'
                tenant: '{{ index .metadata.labels "mylogin.space/tenant" }}'
                region: '{{ index .metadata.labels "topology.kubernetes.io/region" }}'
                zone: '{{ index .metadata.labels "topology.kubernetes.io/zone" }}'
                datacenter: '{{ index .metadata.labels "resolvemy.host/dc" }}'

  template:
    metadata:
      name: '{{ .values.clusterName }}-network-routeserver-{{ .values.environment }}'

      annotations:
        argocd.argoproj.io/manifest-generate-paths: .

    spec:
      project: core

      syncPolicy:
        syncOptions:
          - CreateNamespace=true

      source:
        repoURL: https://github.com/K-FOSS/CoRE-Backplane.git
        path: Network/RouteServer
        targetRevision: main
        plugin:
          name: argocd-lovely-plugin
          env:
            - name: LOVELY_HELM_MERGE
              value: |- # yaml
                env: {{ .values.environment }}

                hub: {{ .values.hub }}

                routeservers:
                {{ nindent 2 (toYaml .values.routeservers) }}

                cluster:
                  name: {{ .values.clusterName }}
                  domain: {{ .values.clusterDomain }}


                datacenter: {{ .values.datacenter }}

                region: {{ .values.region }}


      destination:
        server: '{{ .server }}'
        namespace: core-net-{{ .values.environment }}

