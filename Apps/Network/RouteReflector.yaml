                                  - name: yvr-wan-gw
                                    action: addpath-tx-all-paths
                              unicast:
                                maximum-paths:
                                  base: 4
                                  ibgp: 4

                                neighbor:
                                  - name: cpe-sw
                                    action: activate
                                  
                                  - name: cpe-sw
                                    action: route-reflector-client
                          peers:
                            - address: 172.31.245.3
                              peerGroup: yvr-rrs

                            - address: fd31:A5C9:B1B1:18D2::16
                              peerGroup: cpe-sw-v6

