                                  - name: cpe-sw
                                    action: addpath-tx-all-paths

                                  - name: cpe-sw 
                                    action: 'allowas-in 10'
                                  
                                  - name: yxl-rrs
                                    action: activate

                                  - name: yxl-rrs
                                    action: addpath-tx-all-paths

                                  - name: yxl-rrs
