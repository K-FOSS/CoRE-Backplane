                            - name: KNET-PUB-1
                              prefixes:
                                - seqNum: 5
                                  prefix: 66.165.222.96/27
                                  action: permit
                                  ge: 27

                            - name: GWv4
                              prefixes:
                                - seqNum: 5
                                  prefix: 0.0.0.0/0
                                  action: permit

                        routeMaps:
                          - name: YXL-RR-IN
                            entries:
                              - seqNum: 10
