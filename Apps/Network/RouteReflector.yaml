                                  - name: yvr-wan-gw-v6
                                    action: route-reflector-client

                                  - name: yvr-wan-gw-v6
                                    action: addpath-tx-all-paths

                            ipv4:
                              vpn:
                                neighbor:
                                  - name: yvr-rrs
                                    action: activate

                                  - name: yvr-rrs
                                    action: addpath-tx-all-paths

                                  - name: cpe-sw
