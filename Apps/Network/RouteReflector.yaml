                                  - name: yvr-rrs
                                    action: addpath-tx-all-paths

                            ipv6:
                              labeled-unicast:
                                neighbor:
                                  - name: cpe-sw-v6
                                    action: activate

                                  - name: cpe-sw-v6
                                    action: route-reflector-client

                                  - name: cpe-sw-v6
                                    action: addpath-tx-all-paths

                              vpn:
                                neighbor:
