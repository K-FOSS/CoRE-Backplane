
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: core-backplane-routeserver
  namespace: argocd
spec:
  goTemplate: true
  # goTemplateOptions:
  #   - 'missingkey=error'
  generators:
    - merge:
        mergeKeys:
          - name

        generators:
          - list:
              elements:
                - name: core-dc1-talos-prod
                  values:
                    hub: false
                    routeservers:
                      rs0:
                        ipAddress: 172.31.255.111

                        prefixLists:
                          ipv4:
                            - name: YVR-WAN
                              prefixes:
                                - seqNum: 5
                                  prefix: 24.86.197.0/24
                                  action: permit
                                  ge: 24

                            - name: KNET-PUB-1
                              prefixes:
                                - seqNum: 5
                                  prefix: 66.165.222.96/27
                                  action: permit
                                  ge: 27

                            - name: GWv4
                              prefixes:
                                - seqNum: 5
                                  prefix: 0.0.0.0/0
                                  action: permit

                        routeMaps:
                          - name: YVR-RR-IN
                            entries:
                              - seqNum: 10
                                action: deny
                                match:
                                  ipv4PrefixList: YVR-WAN

                              - seqNum: 100
                                action: permit

                          - name: YVR-RR-OUT
                            entries:
                              - seqNum: 10
                                action: deny
                                match:
                                  ipv4PrefixList: KNET-PUB-1

                              - seqNum: 11
                                action: deny
                                match:
                                  ipv4PrefixList: GWv4

                              - seqNum: 200
                                action: permit

                        networking:
                          interfaces:
                            - type: sriov
                              mtu: 9216
                              routing:
                                ospf:
                                  enabled: true
                                  area: 0.0.0.0
                                  dead: 300
                              ipam:
                                address: 172.16.51.111/24
                              sriov:
                                vlan: 951
                                device: mellanox.com/mlx4_cx3_netdevice
                        bgp:
                          enabled: true
                          clusterId: 172.31.255.255
                          afi:
                            l2vpn:
                              evpn:
                                neighbor:
                                  - name: spine-sw
                                    action: activate

                                  - name: spine-sw
                                    action: route-reflector-client

                                  - name: spine-sw
                                    action: addpath-tx-all-paths

                                  - name: lf-sw
                                    action: activate

                                  - name: lf-sw
                                    action: route-reflector-client

                                  - name: lf-sw
                                    action: addpath-tx-all-paths

                                  - name: yvr-rrs
                                    action: activate

                                  - name: yvr-rrs
                                    action: addpath-tx-all-paths

                                  - name: yxl-rrs
                                    action: activate

                                  - name: yxl-wan-gw
                                    action: activate

                                  - name: yxl-wan-gw
                                    action: route-reflector-client

                                  - name: yxl-wan-gw
                                    action: addpath-tx-all-paths
                            ipv4:
                              vpn:
                                neighbor:
                                  - name: yvr-rrs
                                    action: activate

                                  - name: yvr-rrs
                                    action: addpath-tx-all-paths

                                  - name: yvr-rrs
                                    action: route-map YVR-RR-IN in

                                  - name: yvr-rrs
                                    action: route-map YVR-RR-OUT out

                                  - name: yxl-rrs
                                    action: activate

                                  - name: yxl-rrs
                                    action: addpath-tx-all-paths

                                  - name: yxl-wan-gw
                                    action: activate

                                  - name: yxl-wan-gw
                                    action: route-reflector-client

                                  - name: yxl-wan-gw
                                    action: addpath-tx-all-paths
                          peers:
                            - address: 172.31.255.1
                              peerGroup: spine-sw

                            - address: 172.31.255.19
                              peerGroup: lf-sw

                            - address: 172.31.245.2
                              peerGroup: yvr-rrs

                            - address: 172.31.245.3
                              peerGroup: yvr-rrs

                            - address: 172.16.51.100
                              peerGroup: yxl-rrs

                            - address: 172.31.255.4
                              peerGroup: yxl-wan-gw

                            - address: 172.31.255.5
                              peerGroup: yxl-wan-gw

                            - address: 172.31.255.6
                              peerGroup: yxl-wan-gw
                          peerGroups:
                            - name: spine-sw
                              asn: 64567
                              timers:
                                keepalive: 30
                                holdtime: 30
                                connect: 5

                            - name: lf-sw
                              asn: 64567

                            - name: yxl-wan-gw
                              asn: 64567

                            - name: yvr-rrs
                              asn: 64567

                            - name: yxl-rrs
                              asn: 64567
                        frr:
                          version: '10.6.1'

                - name: core-home1-talos-prod
                  values:
                    hub: false
                    routeservers:
                      rs0:
                        ipAddress: 172.29.255.100

