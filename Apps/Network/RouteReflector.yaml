                                    action: activate

                                  - name: yvr-rrs
                                    action: addpath-tx-all-paths

                                  - name: cpe-sw-v6
                                    action: activate

                                  - name: cpe-sw-v6
                                    action: route-reflector-client

                                  - name: cpe-sw-v6
                                    action: addpath-tx-all-paths

                                  - name: yvr-wan-gw-v6
