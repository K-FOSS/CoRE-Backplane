
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: core-backplane-net-tunneler
  namespace: argocd

  annotations:
    argocd.argoproj.io/sync-wave: '1'
spec:
  goTemplate: true
  # goTemplateOptions:
  #   - 'missingkey=error'
  generators:
    - merge:
        mergeKeys:
          - name

        generators:
          - list:
              elements:
                - name: core-dc1-talos-prod
                  values:
                    tunnelers:
                      - name: yxl-tunneler1
                        
                        interfaces:
                          - type: sriov
                            mtu: 1500
                            rings:
                              tx: 4096
                              rx: 4096
                            offload:
                              rx-udp-gro-forwarding: 'on'
                            tuning:
                              sysctl:
                                net.ipv4.udp_rmem_min: "8192"
                                net.ipv4.udp_wmem_min: "8192"
                                net.ipv4.tcp_rmem: "4096 131072 67108864"
                                net.ipv4.tcp_wmem: "4096 65536 67108864"
                            routing:
                              ospf:
                                enabled: false
                            ipam:
                              addresses:
                                - 100.64.92.37/29
                                - 66.165.222.124/32
                              routes:
                                - dst: 0.0.0.0/0
                                  gw: 100.64.92.33
                                  src: 66.165.222.124
                            sriov:
                              vlan: 10
                              device: mellanox.com/mlx4_cx3_netdevice

                          - type: sriov
                            mtu: 9216
                            routing:
                              ospf:
                                enabled: true
                                dead: '300'
                                priority: '0'
                            ipam:
                              address: 172.16.51.31/24
                            sriov:
                              vlan: 951
                              device: mellanox.com/mlx4_cx3_netdevice
                        frr:
                          enabled: true
                          routerId: 66.165.222.124
                          logLevel: informational
                          image:
                            repository: quay.io/frrouting/frr
                            tag: 10.6.1
                            pullPolicy: IfNotPresent
                          bgp:
                            enabled: false
                          ospf:
                            enabled: true
                          ospf6:
                            enabled: false
                          prefixLists: {}
                          rawConfig: ""

                        tunnels:
                          - name: sbc1-home1
                            type: wireguard
                            port: 54764
                            privateKey: <path:CORE0_SITE1/data/Network/Wireguard/OldTunneler/Server#PrivateKey>
                            address: 172.31.243.1/30
                            ospf:
                              enabled: true
                              cost: 4000
                            peers:
                              - name: sbc1-home1
                                publicKey: <path:CORE0_SITE1/data/Network/Wireguard/OldTunneler/Home1/SBC1#PublicKey>
                                allowedIPs:
                                  - 172.31.243.2/32

                          - name: yvr-home2-tunneler1
                            type: wireguard
                            port: 20011
                            mtu: 1440
                            address: 172.29.10.1/30
                            privateKey: <path:CORE0_SITE1/data/Network/Wireguard/YXL/DC1/Tunneler1/YVR-Tunneler1#PrivateKey>
                            ospf:
                              enabled: true
                              cost: 2000
                            peers:
                              - name: tunneler1.home2.yvr.resolvemy.host
                                publicKey: <path:CORE0_SITE1/data/Network/Wireguard/YXL/DC1/Tunneler1/YVR-Tunneler1#YVRTunneler1Pub>
                                endpoint: home.mylogin.space:20011
                                allowedIPs:
                                  - 172.29.10.2/32
                                  - 0.0.0.0/0

                          - name: yvr-home2-tunneler2
                            type: wireguard
                            port: 20012
                            mtu: 1440
                            address: 172.29.12.1/30
                            privateKey: <path:CORE0_SITE1/data/Network/Wireguard/YXL/DC1/Tunneler1/YVR-Tunneler2#PrivateKey>
                            ospf:
                              enabled: true
                              cost: 2000
                            peers:
                              - name: tunneler2.home2.yvr.resolvemy.host
                                publicKey: <path:CORE0_SITE1/data/Network/Wireguard/YXL/DC1/Tunneler1/YVR-Tunneler2#YVRTunneler2PublicKey>
                                endpoint: home.mylogin.space:20012
                                allowedIPs:
                                  - 172.29.12.2/32
                                  - 0.0.0.0/0

                          - name: wan-gw2-yvr-home2
                            type: wireguard
                            port: 54767
                            address: 172.31.244.9
                            privateKey: <path:CORE0_SITE1/data/Network/Wireguard/YXL/DC1/Tunneler1/Home2-WANGW2#PrivateKey>
                            peers:
                              - name: augy-ipad-pro.otg.resolvemy.host
                                publicKey: <path:CORE0_SITE1/data/Network/Wireguard/YVR/Tunneler1/RemoteManagement#AugyiPADPub>
                                allowedIPs:
                                  - 172.31.244.10/32

                - name: core-home1-talos-prod
                  values:
                    tunnelers:
                      - name: yvr-tunneler1
                        pod:
                          labels:
                            tunneler.resolvemy.host/cluster: yvr-home2
                        affinity:
                          nodeAffinity:
                            requiredDuringSchedulingIgnoredDuringExecution:
                              nodeSelectorTerms:
                                - matchExpressions:
                                    - key: kubernetes.io/hostname
                                      operator: In
                                      values:
                                        - hpc3
                                        - srv2
                          podAntiAffinity:
                            requiredDuringSchedulingIgnoredDuringExecution:
                            - labelSelector:
                                matchLabels:
                                  tunneler.resolvemy.host/cluster: yvr-home2
                              topologyKey: kubernetes.io/hostname
                              namespaceSelector: {}
                        interfaces:
                          - type: sriov
                            mtu: 1500
                            routing:
                              ospf:
                                enabled: false
                            rings:
                              tx: 4096
                              rx: 4096
                            offload:
                              rx-udp-gro-forwarding: 'on'
                            tuning:
                              sysctl:
                                net.ipv4.udp_rmem_min: "8192"
                                net.ipv4.udp_wmem_min: "8192"
                                net.ipv4.tcp_rmem: "4096 131072 67108864"
                                net.ipv4.tcp_wmem: "4096 65536 67108864"
                            ipam:
                              address: 10.0.0.20/24
                              routes:
                                - dst: 0.0.0.0/0
                                  gw: 10.0.0.1
                            sriov:
                              vlan: 150
                              device: intel.com/intel_x540_netdevice_port0

                          - type: sriov
                            mtu: 9710
                            routing:
                              ospf:
                                enabled: true
                            rings:
                              tx: 4096
                              rx: 4096
                            offload:
                              rx-udp-gro-forwarding: 'on'
                            ipam:
                              address: 10.8.2.1/30
                            sriov:
                              vlan: 2126
                              device: intel.com/intel_x540_netdevice_port1

                          - type: sriov
                            mtu: 9000
                            routing:
                              ospf:
                                enabled: true
                            ipam:
                              address: 172.31.245.4/29
                            sriov:
                              vlan: 50
                              device: intel.com/x540_port0_vlan50
                        frr:
                          enabled: true
                          routerId: 10.8.2.1
                          logLevel: informational
                          image:
                            repository: quay.io/frrouting/frr
                            tag: 10.6.1
                            pullPolicy: IfNotPresent
                          bgp:
                            enabled: false
                          ospf:
                            enabled: true
                          ospf6:
                            enabled: true
                          prefixLists: {}
                          rawConfig: ""

                        tunnels:
                          - name: test-ptp
                            type: wireguard
                            port: 17011
                            mtu: 1440
                            address: 172.20.1.2/30
                            privateKey: <path:CORE0_SITE1/data/Network/Wireguard/YVR/Tunneler1/PTPTest#PrivateKey>
                            peers:
                              - name: augy-ipad-pro.otg.resolvemy.host
                                publicKey: <path:CORE0_SITE1/data/Network/Wireguard/YVR/Tunneler1/PTPTest#Tunneler2PubKey>
                                endpoint: 10.8.2.2:17011
                                allowedIPs:
                                  - 172.20.1.1/32

                          - name: yxl-dc1-tunneler1
                            type: wireguard
                            port: 20011
                            mtu: 1440
                            address: 172.29.10.2/30
                            privateKey: <path:CORE0_SITE1/data/Network/Wireguard/YVR/Tunneler1/YXL-DC1-Tunneler1#PrivateKey>
                            ospf:
                              enabled: true
                              cost: 2000
                            peers:
                              - name: tunneler1.home2.yvr.resolvemy.host
                                publicKey: <path:CORE0_SITE1/data/Network/Wireguard/YVR/Tunneler1/YXL-DC1-Tunneler1#YXLDC1TunnelerPub>
                                allowedIPs:
                                  - 172.29.10.1/32
                                  - 0.0.0.0/0

                          - name: remote-man
                            type: wireguard
                            port: 10010
                            address: 172.31.244.9
                            privateKey: <path:CORE0_SITE1/data/Network/Wireguard/YVR/Tunneler1#PrivateKey>
                            peers:
                              - name: augy-ipad-pro.otg.resolvemy.host
                                publicKey: <path:CORE0_SITE1/data/Network/Wireguard/YVR/Tunneler1/RemoteManagement#AugyiPADPub>
                                allowedIPs:
                                  - 172.31.244.10/32
                                  - 0.0.0.0/0

                      - name: yvr-tunneler2
                        pod:
                          labels:
                            tunneler.resolvemy.host/cluster: yvr-home2
                        affinity:
                          nodeAffinity:
                            requiredDuringSchedulingIgnoredDuringExecution:
                              nodeSelectorTerms:
                                - matchExpressions:
                                    - key: kubernetes.io/hostname
                                      operator: In
                                      values:
                                        - hpc3
                                        - srv2

                          podAntiAffinity:
                            requiredDuringSchedulingIgnoredDuringExecution:
                            - labelSelector:
                                matchLabels:
                                  tunneler.resolvemy.host/cluster: yvr-home2
                              topologyKey: kubernetes.io/hostname
                              namespaceSelector: {}
                        interfaces:
                          - type: sriov
                            mtu: 1500
                            rings:
                              tx: 4096
                              rx: 4096
                            offload:
                              rx-udp-gro-forwarding: 'on'
                            tuning:
                              sysctl:
                                net.ipv4.udp_rmem_min: "8192"
                                net.ipv4.udp_wmem_min: "8192"
                                net.ipv4.tcp_rmem: "4096 131072 67108864"
                                net.ipv4.tcp_wmem: "4096 65536 67108864"
                            routing:
                              ospf:
                                enabled: false
                            ipam:
                              address: 10.0.0.21/24
                              routes:
                                - dst: 0.0.0.0/0
                                  gw: 10.0.0.1
                            sriov:
                              vlan: 150
                              device: intel.com/intel_x540_netdevice_port0

                          - type: sriov
                            mtu: 9710
                            routing:
                              ospf:
                                enabled: true
                            rings:
                              tx: 4096
                              rx: 4096
                            offload:
                              rx-udp-gro-forwarding: 'on'
                            ipam:
                              address: 10.8.2.2/30
                            sriov:
                              vlan: 2126
                              device: intel.com/intel_x540_netdevice_port1

                          - type: sriov
                            mtu: 9000
                            routing:
                              ospf:
                                enabled: true
                            ipam:
                              address: 172.31.245.5/29
                            rings:
                              tx: 4096
                              rx: 4096
                            offload:
                              rx-udp-gro-forwarding: 'on'
                            sriov:
                              vlan: 50
                              device: intel.com/x540_port0_vlan50
                        frr:
                          enabled: true
                          routerId: 10.8.2.2
                          logLevel: informational
                          image:
                            repository: quay.io/frrouting/frr
                            tag: 10.6.1
                            pullPolicy: IfNotPresent
                          bgp:
                            enabled: false
                          ospf:
                            enabled: true
                          ospf6:
                            enabled: true
                          prefixLists: {}
                          rawConfig: ""

                        tunnels:
                          - name: test-ptp
                            type: wireguard
                            port: 17011
                            mtu: 1440
                            address: 172.20.1.1/30
                            privateKey: <path:CORE0_SITE1/data/Network/Wireguard/YVR/Tunneler2#PrivateKey>
                            peers:
                              - name: tunneler1.home2.yvr.resolvemy.host
                                publicKey: <path:CORE0_SITE1/data/Network/Wireguard/YVR/Tunneler2/PTPTest#Tunneler1Pub>
                                endpoint: 10.8.2.1:17011
                                allowedIPs:
                                  - 172.20.1.2/32
                                  - 0.0.0.0/0

                          - name: yxl-dc1-tunneler1
                            type: wireguard
                            port: 20012
                            mtu: 1440
                            address: 172.29.12.2/30
                            privateKey: <path:CORE0_SITE1/data/Network/Wireguard/YVR/Tunneler2/YXLDC1Tunneler1#PrivateKey>
                            ospf:
                              enabled: true
                              cost: 2000
                            peers:
                              - name: tunneler1.dc1.yxl.resolvemy.host
                                publicKey: <path:CORE0_SITE1/data/Network/Wireguard/YVR/Tunneler2/YXLDC1Tunneler1#YXLDC1Tunneler1PubKey>
                                allowedIPs:
                                  - 172.29.12.1/32
                                  - 0.0.0.0/0

                          - name: remote-man
                            type: wireguard
                            port: 10011
                            address: 172.21.244.9
                            privateKey: <path:CORE0_SITE1/data/Network/Wireguard/YVR/Tunneler1#PrivateKey>
                            ospf:
                              enabled: true
                            peers:
                              - name: augy-ipad-pro.otg.resolvemy.host
                                publicKey: <path:CORE0_SITE1/data/Network/Wireguard/YXL/DC1/CoRE-Prod/Home1-WANGW2#PublicKey>
                                allowedIPs:
                                  - 172.21.244.10/32

          - clusters:
              selector:
                matchLabels:
                  mylogin.space/tenant: 'core.mylogin.space'
                  resolvemy.host/computetype: 'baremetal'
              values:
                clusterName: '{{ .name }}'
                environment: 'prod'
                clusterDomain: '{{ index .metadata.labels "cluster.kubernetes.io/domain" }}'
                tenant: '{{ index .metadata.labels "mylogin.space/tenant" }}'
                region: '{{ index .metadata.labels "topology.kubernetes.io/region" }}'
                zone: '{{ index .metadata.labels "topology.kubernetes.io/zone" }}'
                datacenter: '{{ index .metadata.labels "resolvemy.host/dc" }}'

  syncPolicy:
    preserveResourcesOnDeletion: true

  template:
    metadata:
      name: '{{ .values.clusterName }}-tunneler-{{ .values.environment }}'

      annotations:
        argocd.argoproj.io/manifest-generate-paths: .

    spec:
      project: core
      syncPolicy:
        syncOptions:
          - ServerSideApply=true

      source:
        path: Network/Tunnels
        repoURL: https://github.com/K-FOSS/CoRE-Backplane.git
        targetRevision: HEAD
        plugin:
          name: argocd-lovely-plugin
          env:
            - name: LOVELY_HELM_MERGE
              value: |-
                env: {{ .values.environment }}

                cluster:
                  name: {{ .values.clusterName }}
                  domain: {{ .values.clusterDomain }}

                tunnelers:
                {{ nindent 2 (toYaml .values.tunnelers) }}

                datacenter: {{ .values.datacenter }}

                region: {{ .values.region }}
                zone: {{ .values.zone }}


      destination:
        server: '{{ .server }}'
        namespace: core-net-tunneler-{{ .values.environment }}
