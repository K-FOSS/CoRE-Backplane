
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: core-backplane-net-natpuncher
  namespace: argocd

  annotations:
    argocd.argoproj.io/sync-wave: '1'
spec:
  goTemplate: true
  # goTemplateOptions:
  #   - 'missingkey=error'
  generators:
    - merge:
        mergeKeys:
          - name

        generators:
          - list:
              elements:
                - name: core-dc1-talos-prod
                  values:
                    hub: false
                    UPNP:
                      enabled: false
                    CoTurn:
                      hub: false
                    Tunneler:
                      hub: true

                - name: core-home1-talos-prod
                  values:
                    hub: false
                    UPNP:
                      enabled: true

                      network:
                        namespace: core-media
                        name: rogers-network
                        interface: eth1

                      ports:
                        - target: 10.0.0.19
                          internalPort: 80
                          externalPort: 80
                          protocol: TCP
                          duration: 8600

                        - target: 10.0.0.19
                          internalPort: 443
                          externalPort: 443
                          protocol: TCP
                          duration: 8600

                        - target: 10.0.0.19
                          internalPort: 4763
                          externalPort: 4763
                          protocol: UDP
                          duration: 8600

                        - target: 10.0.0.19
                          internalPort: 2010
                          externalPort: 2010
                          protocol: UDP
                          duration: 8600

                    CoTurn:
                      hub: false
                    Tunneler:
                      hub: true
          - clusters:
              selector:
                matchLabels:
                  mylogin.space/tenant: 'core.mylogin.space'
                  resolvemy.host/computetype: 'baremetal'
                  resolvemy.host/nodetype: 'infra'
              values:
                clusterName: '{{ .name }}'
                environment: 'prod'
                clusterDomain: '{{ index .metadata.labels "cluster.kubernetes.io/domain" }}'
                tenant: '{{ index .metadata.labels "mylogin.space/tenant" }}'
                region: '{{ index .metadata.labels "topology.kubernetes.io/region" }}'
                zone: '{{ index .metadata.labels "topology.kubernetes.io/zone" }}'
                datacenter: '{{ index .metadata.labels "resolvemy.host/dc" }}'

  syncPolicy:
    preserveResourcesOnDeletion: true

  template:
    metadata:
      name: '{{ .values.clusterName }}-natpuncher-{{ .values.environment }}'

      annotations:
        argocd.argoproj.io/manifest-generate-paths: .

    spec:
      project: core
      syncPolicy:
        syncOptions:
          - ServerSideApply=true

      source:
        path: Network/NATPuncher
        repoURL: https://github.com/K-FOSS/CoRE-Backplane.git
        targetRevision: HEAD
        plugin:
          name: argocd-lovely-plugin
          env:
            - name: LOVELY_HELM_MERGE
              value: |-
                env: {{ .values.environment }}

                hub: {{ .values.hub }}

                cluster:
                  name: {{ .values.clusterName }}
                  domain: {{ .values.clusterDomain }}

                UPNP:
                  {{ nindent 2 (toYaml .values.UPNP) }}

                datacenter: {{ .values.datacenter }}

                region: {{ .values.region }}

      destination:
        server: '{{ .server }}'
        namespace: core-{{ .values.environment }}
