---
{{ $networks := dict }}
{{- range $networkIndex, $network := .Values.networks }}
{{- $nicType := (default "sriov" $network.type) }}
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: '{{ $network.name }}'

  {{- if eq $nicType "sriov" }}
  {{ $_ := set $networks $network.name (
      merge
        (dict "type" $nicType)
        (deepCopy $network)
      ) 
  }}
  annotations:
    k8s.v1.cni.cncf.io/resourceName: '{{ $network.sriov.device }}'
  {{- end }}
spec:
  config: |
    {
      "cniVersion": "1.0.0",
      {{- if $network.mtu }}
      "mtu": {{ $network.mtu }},
      {{- end }}

      {{- with $network.vlan }}
      "vlan": {{ . }},
      {{- if eq $nicType "bridge" }}
      "preserveDefaultVlan": false,
      {{- end }}
      {{- end }}

      {{- if eq $nicType "bridge" }}
      "bridge": "{{ $network.bridge }}",
      {{- end }}
      
      "type": "{{ $nicType }}"
    }
---
{{ end }}
{{- range $vmIndex, $vm := .Values.vms }}
{{- $defaults := default (dict) $.Values.vmDefaults }}
{{- $cpu := mergeOverwrite (dict "cores" 2 "threads" 2 "sockets" 1 "model" "host-passthrough") (deepCopy (default (dict) $defaults.cpu)) (deepCopy (default (dict) $vm.cpu)) }}
{{- $resources := mergeOverwrite (dict "requests" (dict "memory" "4Gi" "cpu" "100m") "limits" (dict "memory" "4Gi" "cpu" 4)) (deepCopy (default (dict) $defaults.resources)) (deepCopy (default (dict) $vm.resources)) }}
{{- $devices := mergeOverwrite (deepCopy (default (dict) $defaults.devices)) (deepCopy (default (dict) $vm.devices)) }}
{{- $disk := default (dict) $vm.disk }}
{{- $diskEnabled := or (not (hasKey $disk "enabled")) $disk.enabled }}
{{- $diskAttachment := default (dict) $disk.attachment }}
{{- $diskType := lower (default "disk" $diskAttachment.type) }}
{{- if not (has $diskType (list "disk" "cdrom" "lun")) }}{{- fail (printf "vms[%d].disk.attachment.type must be disk, cdrom, or lun" $vmIndex) }}{{- end }}
{{- $diskTarget := deepCopy (default (dict) $diskAttachment.target) }}
{{- $diskBus := "virtio" }}
{{- if eq $diskType "cdrom" }}{{- $diskBus = "sata" }}{{- else if eq $diskType "lun" }}{{- $diskBus = "scsi" }}{{- end }}
{{- if $disk.bus }}{{- $diskBus = lower $disk.bus }}{{- end }}
{{- if $diskAttachment.bus }}{{- $diskBus = lower $diskAttachment.bus }}{{- end }}
{{- if not (hasKey $diskTarget "bus") }}{{- $_ := set $diskTarget "bus" $diskBus }}{{- end }}
{{- $diskBootOrder := 1 }}
{{- if $vm.installing }}{{- $diskBootOrder = 2 }}{{- end }}
{{- if $diskAttachment.bootOrder }}{{- $diskBootOrder = $diskAttachment.bootOrder }}{{- end }}
{{- $installerAttachment := default (dict) $vm.installerAttachment }}
{{- $installerType := lower (default "cdrom" $installerAttachment.type) }}
{{- if not (has $installerType (list "disk" "cdrom" "lun")) }}{{- fail (printf "vms[%d].installerAttachment.type must be disk, cdrom, or lun" $vmIndex) }}{{- end }}
{{- $installerTarget := deepCopy (default (dict) $installerAttachment.target) }}
{{- $installerBus := "sata" }}
{{- if eq $installerType "disk" }}{{- $installerBus = "virtio" }}{{- else if eq $installerType "lun" }}{{- $installerBus = "scsi" }}{{- end }}
{{- if $installerAttachment.bus }}{{- $installerBus = lower $installerAttachment.bus }}{{- end }}
{{- if not (hasKey $installerTarget "bus") }}{{- $_ := set $installerTarget "bus" $installerBus }}{{- end }}
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: {{ $vm.name }}
spec:
  running: true
  template:
    metadata:
      labels:
        kubevirt.io/domain: {{ $vm.name }}
    spec:
      {{- with (default $defaults.priorityClassName $vm.priorityClassName) }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with (default $defaults.nodeSelector $vm.nodeSelector) }}
      nodeSelector: {{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with (default $defaults.affinity $vm.affinity) }}
      affinity: {{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with (default $defaults.tolerations $vm.tolerations) }}
      tolerations: {{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with (default $defaults.topologySpreadConstraints $vm.topologySpreadConstraints) }}
      topologySpreadConstraints: {{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with (default $defaults.schedulerName $vm.schedulerName) }}
      schedulerName: {{ . }}
      {{- end }}
      {{- with (default $defaults.evictionStrategy $vm.evictionStrategy) }}
      evictionStrategy: {{ . }}
      {{- end }}
      networks:
        {{- if and $vm.podNetwork $vm.podNetwork.enabled }}
        - name: default
          pod: {} # Stock pod network
        {{- end }}

        {{- range $networkIndex, $vmNetwork := $vm.networks }}
        {{- $network := index $networks $vmNetwork.name }}
        - name: {{ $vmNetwork.name }}
          multus:
            networkName: {{ $vmNetwork.name }}
        {{- end }}

      domain:
        cpu: {{ toYaml $cpu | nindent 10 }}
        {{- with (default $defaults.memory $vm.memory) }}
        memory: {{ toYaml . | nindent 10 }}
        {{- end }}
        machine:
          type: q35
        features:
          smm:
            enabled: true
        {{- if and $vm.boot $vm.boot.secureBoot }}
        firmware:
          bootloader:
            efi:
              secureBoot: true
        {{- end }}
        devices:
          autoattachPodInterface: {{ if and $vm.podNetwork $vm.podNetwork.enabled }}true{{ else }}false{{ end }}
          {{- with $devices }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
          {{- if and $vm.tpm $vm.tpm.enabled }}
          tpm: {}
          {{- end }}

          disks:
            {{- if $vm.installing }}
            - name: installer
              bootOrder: {{ default 1 $installerAttachment.bootOrder }}
              {{- with $installerAttachment.options }}
              {{- toYaml . | nindent 14 }}
              {{- end }}
              {{ $installerType }}: {{ toYaml $installerTarget | nindent 16 }}
            {{- end }}

            {{- if $diskEnabled }}
            - name: data-disk
              bootOrder: {{ $diskBootOrder }}
              {{- with $diskAttachment.options }}
              {{- toYaml . | nindent 14 }}
              {{- end }}
              {{ $diskType }}: {{ toYaml $diskTarget | nindent 16 }}
            {{- end }}

          interfaces:
            {{- range $networkIndex, $vmNetwork := $vm.networks }}
            {{- $network := index $networks $vmNetwork.name }}
            - name: {{ $vmNetwork.name }}
              {{ default "sriov" $network.type }}: {}
              {{- with $vmNetwork.macAddress }}
              macAddress: '{{ . }}'
              {{- end }}
            {{- end }}


            {{- if and $vm.podNetwork  $vm.podNetwork.enabled }}
            - name: default
              masquerade: {}
              {{- with $vm.podNetwork.macAddress }}
              macAddress: {{ . | quote }}
              {{- end }}
              {{- if $vm.ports }}
              ports:
                {{- range $portIndex, $port := $vm.ports }}
                - name: {{ $port.name }}
                  port: {{ $port.port }}
                  {{- with $port.protocol }}
                  protocol: {{ . }}
                  {{- end }}
                {{- end }}
              {{- end }}
            {{- end }}

        resources: {{ toYaml $resources | nindent 10 }}
      {{- if or $vm.installing $diskEnabled }}
      volumes:
        {{- if $vm.installing }}
        - name: installer
          dataVolume:
            name: {{ $vm.installer }}
        {{ end }}
        {{- if $diskEnabled }}
        - dataVolume:
            name: {{ $vm.name }}
          name: data-disk
        {{- end }}
      {{- end }}

  {{- if $diskEnabled }}
  dataVolumeTemplates:
    - metadata:
        name: {{ $vm.name }}
      spec:
        {{- with $disk.contentType }}
        contentType: {{ . }}
        {{- end }}
        {{- with $disk.preallocation }}
        preallocation: {{ . }}
        {{- end }}
        {{- with $disk.priorityClassName }}
        priorityClassName: {{ . }}
        {{- end }}
        pvc:
          accessModes: {{ toYaml (default (list "ReadWriteOnce") $disk.accessModes) | nindent 12 }}
          {{- with $disk.storageClassName }}
          storageClassName: {{ . | quote }}
          {{- end }}
          {{- with $disk.volumeMode }}
          volumeMode: {{ . }}
          {{- end }}
          resources:
            requests:
              storage: {{ default "20Gi" $disk.size }}
        {{- if $disk.sourceRef }}
        sourceRef: {{ toYaml $disk.sourceRef | nindent 10 }}
        {{- else if $disk.source }}
        source: {{ toYaml $disk.source | nindent 10 }}
        {{- else if $disk.url }}
        source:
          http:
            url: {{ $disk.url }}
            {{- with $disk.secretRef }}
            secretRef: {{ . }}
            {{- end }}
            {{- with $disk.certConfigMap }}
            certConfigMap: {{ . }}
            {{- end }}
            {{- with $disk.extraHeaders }}
            extraHeaders: {{ toYaml . | nindent 14 }}
            {{- end }}
        {{- else }}
        source:
          blank: {}
        {{- end }}
  {{- end }}
---
{{- $services := dict }}
{{- range $portIndex, $port := $vm.ports }}
{{- if $port.expose }}
{{- if not (and $vm.podNetwork $vm.podNetwork.enabled) }}
{{- fail (printf "vms[%d].ports[%d] cannot be exposed unless podNetwork.enabled is true" $vmIndex $portIndex) }}
{{- end }}
{{- $serviceName := default $port.name $port.serviceName }}
{{- $serviceType := default "ClusterIP" $port.serviceType }}
{{- if hasKey $services $serviceName }}
{{- $service := index $services $serviceName }}
{{- if ne $service.type $serviceType }}
{{- fail (printf "vms[%d].ports using serviceName %q must use the same serviceType" $vmIndex $serviceName) }}
{{- end }}
{{- $_ := set $service "ports" (append $service.ports $port) }}
{{- else }}
{{- $_ := set $services $serviceName (dict "type" $serviceType "ports" (list $port)) }}
{{- end }}
{{- end }}
{{- end }}
{{- range $serviceName, $service := $services }}
apiVersion: v1
kind: Service
metadata:
  name: {{ printf "%s-%s" $vm.name $serviceName }}
spec:
  selector:
    kubevirt.io/domain: {{ $vm.name }}
  ports:
    {{- range $portIndex, $port := $service.ports }}
    - name: {{ $port.name }}
      port: {{ default $port.port $port.servicePort }}
      targetPort: {{ $port.port }}
      protocol: {{ upper (default "TCP" $port.protocol) }}
    {{- end }}
  type: {{ $service.type }}
---
{{- end }}
{{- end }}
