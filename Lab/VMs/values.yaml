env: prod

installing: false

# Defaults can be overridden per VM. CPU topology controls the guest-visible
# vCPUs, while resources controls what Kubernetes reserves and caps on the
# node. For guaranteed CPU allocation, set dedicatedCpuPlacement: true and
# request/limit an equal, whole number of CPUs.
vmDefaults:
  priorityClassName: system-cluster-critical
  cpu:
    cores: 2
    sockets: 1
    threads: 2
    model: host-passthrough
  resources:
    requests:
      cpu: 32m
      memory: 64Mi
    limits:
      cpu: 4
      memory: 4Gi

installers:
  - name: vyos
    url: https://github.com/vyos/vyos-nightly-build/releases/download/2026.07.11-0033-rolling/vyos-2026.07.11-0033-rolling-generic-amd64.iso
    size: 30Gi

  - name: flatcar
    url: https://stable.release.flatcar-linux.net/amd64-usr/current/flatcar_production_kubevirt_image.qcow2
    size: 30Gi

  # A bootable disk image can be imported once as a seed and cloned for each
  # VM. Unlike an ISO installer, this DataVolume is not attached to the VM as
  # removable installation media.
  # - name: opnsense-bootdisk-seed
  #   url: https://images.example.test/OPNsense-nano-amd64.img.bz2
  #   size: 8Gi
  #   contentType: kubevirt

  # CDI archives and non-HTTP sources can be configured without changing the
  # templates. `url` remains shorthand for source.http.url.
  # - name: archived-rootfs
  #   size: 30Gi
  #   contentType: archive
  #   preallocation: true
  #   storageClassName: fast
  #   source:
  #     http:
  #       url: https://images.example.test/rootfs.tar.gz
  #       secretRef: image-download-credentials
  #       certConfigMap: image-download-ca
  #
  # Other CDI source types (registry, pvc, snapshot, blank, upload, and vddk)
  # may be supplied under `source`; DataSource references use `sourceRef`.

networks:
  - name: wan-home
    vlan: 150
    mtu: 1500
    type: sriov
    sriov:
      trust: true
      device: intel.com/intel_x540_dpdk

  - name: home2-rt2
    vlan: 20
    mtu: 9000
    type: sriov
    sriov:
      trust: true
      device: intel.com/intel_x540_dpdk

  - name: home2-rt2-alt1
    vlan: 21
    mtu: 9000
    type: sriov
    sriov:
      trust: true
      device: intel.com/intel_x540_dpdk

  - name: home2-rt1
    vlan: 30
    mtu: 9000
    type: sriov
    sriov:
      trust: true
      device: intel.com/intel_x540_dpdk

  - name: home2-rt1-alt1
    vlan: 31
    mtu: 9000
    type: sriov
    sriov:
      trust: true
      device: intel.com/intel_x540_dpdk

  - name: conntrack-sync
    vlan: 1000
    mtu: 1500
    type: sriov
    sriov:
      trust: true
      device: intel.com/intel_x540_dpdk

vms:
  - name: windows-lab
    installing: true

    # Override compute reservations and guest CPU topology per VM.
    # cpu:
    #   cores: 4
    #   sockets: 1
    #   threads: 1
    #   model: host-passthrough
    #   dedicatedCpuPlacement: true
    #   isolateEmulatorThread: true
    # resources:
    #   requests:
    #     cpu: 4
    #     memory: 8Gi
    #     hugepages-2Mi: 8Gi
    #   limits:
    #     cpu: 4
    #     memory: 8Gi
    #     hugepages-2Mi: 8Gi
    # memory:
    #   guest: 8Gi
    #   hugepages:
    #     pageSize: 2Mi

    # Arbitrary KubeVirt devices such as GPUs and host devices can be allocated
    # using their device-plugin resource names.
    # devices:
    #   gpus:
    #     - name: gpu0
    #       deviceName: nvidia.com/GA102
    #   hostDevices:
    #     - name: usb-controller
    #       deviceName: example.com/usb-controller

    installer: windows-11
    # The installer defaults to a SATA CD-ROM. KubeVirt disk-entry fields can
    # be customized with `type`, target-specific fields, and common `options`.
    # installerAttachment:
    #   type: cdrom                 # disk, cdrom, or lun
    #   bus: sata                   # shorthand for target.bus
    #   bootOrder: 1
    #   target:
    #     readonly: true
    #     tray: closed
    #   options:
    #     serial: windows-installer
    uefi: true

    boot:
      mode: uefi
      secureBoot: true

    tpm:
      enabled: true

    nodeSelector:
      kubernetes.io/hostname: 'hpc3'
    # affinity, tolerations, topologySpreadConstraints, schedulerName, and
    # evictionStrategy are also passed through to the VM instance template.

    disk:
      enabled: true

      size: 128Gi
      # Attachment defaults to type=disk and bus=virtio. `target` accepts the
      # selected KubeVirt target's fields; `options` accepts common Disk fields
      # such as cache, io, serial, dedicatedIOThread, shareable, errorPolicy,
      # blockSize, and tag. Set `bootOrder` directly under `attachment`.
      # attachment:
      #   type: disk                # disk, cdrom, or lun
      #   bus: virtio               # shorthand for target.bus
      #   bootOrder: 2
      #   target:
      #     readonly: false
      #     pciAddress: "0000:81:01.0"
      #   options:
      #     cache: none
      #     io: native
      #     serial: windows-root
      # Optional CDI fields supported here include contentType (kubevirt or
      # archive), preallocation, storageClassName, volumeMode, accessModes,
      # priorityClassName, source, and sourceRef. `url` is HTTP shorthand.

    networks:
      - name: wan-home

  - name: wan-rt1
    installing: false
    disk:
      enabled: true

      size: 5Gi

    networks:
      - name: wan-home

  - name: wan-rt2
    installing: false

    boot:
      mode: uefi
      secureBoot: false

    podNetwork:
      enabled: true
      # macAddress: '02:00:00:00:00:01'

    # Ports are forwarded through KubeVirt's masquerade interface. Setting
    # `expose` creates a Service named <vm>-<serviceName>. serviceName defaults
    # to the port name, so setting the same serviceName on multiple ports groups
    # them into one Service. servicePort defaults to the guest port and
    # serviceType defaults to ClusterIP.
    ports:
      - name: wg-2011
        port: 64763
        protocol: UDP
        expose: true
        # serviceName: wireguard
        # servicePort: 64763
        # serviceType: LoadBalancer

    disk:
      enabled: true

      size: 5Gi

    networks:
      - name: wan-home
        macAddress: '02:01:50:00:02:01'

      - name: home2-rt2

  # Bootable-image example: CDI first imports the IMG above into the
  # `opnsense-bootdisk-seed` DataVolume/PVC, then creates this VM's own boot
  # disk by cloning that PVC. `installing` stays false, so no installer CD-ROM
  # is attached; the cloned disk is bootOrder 1 and remains writable by the VM.
  # The source namespace must match the Helm release namespace.
  # - name: opnsense-fw1
  #   installing: false
  #   boot:
  #     mode: uefi
  #     secureBoot: false
  #   disk:
  #     enabled: true
  #     size: 16Gi
  #     attachment:
  #       type: disk
  #       bus: sata
  #       bootOrder: 1
  #     source:
  #       pvc:
  #         namespace: vm-lab
  #         name: opnsense-bootdisk-seed
  #   podNetwork:
  #     enabled: false
  #   networks:
  #     - name: wan-home
