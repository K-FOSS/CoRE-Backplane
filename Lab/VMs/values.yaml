env: prod

installing: false

installers:
  - name: windows-11
    url: http://10.1.1.84/Win11_25H2_English_x64.iso
    size: 30Gi

networks:
  - name: wan-home
    vlan: 150
    mtu: 1500
    type: sriov
    sriov:
      trust: true
      device: intel.com/intel_x540_dpdk

  - name: home2-rt2
    vlan: 20
    mtu: 9000
    type: sriov
    sriov:
      trust: true
      device: intel.com/intel_x540_dpdk

  - name: home2-rt2-alt1
    vlan: 21
    mtu: 9000
    type: sriov
    sriov:
      trust: true
      device: intel.com/intel_x540_dpdk

  - name: home2-rt1
    vlan: 30
    mtu: 9000
    type: sriov
    sriov:
      trust: true
      device: intel.com/intel_x540_dpdk

  - name: home2-rt1-alt1
    vlan: 31
    mtu: 9000
    type: sriov
    sriov:
      trust: true
      device: intel.com/intel_x540_dpdk

  - name: conntrack-sync
    vlan: 1000
    mtu: 1500
    type: sriov
    sriov:
      trust: true
      device: intel.com/intel_x540_dpdk

vms:
  - name: windows-lab
    installing: true

    installer: windows-11
    uefi: true

    boot:
      mode: uefi
      secureBoot: true

    tpm:
      enabled: true

    nodeSelector:
      kubernetes.io/hostname: 'hpc3'

    disk:
      enabled: true

      size: 128Gi

    networks:
      - name: wan-home

  - name: wan-rt1
    installing: false
    disk:
      enabled: true

      size: 5Gi

    networks:
      - name: wan-home

  - name: wan-rt2
    installing: false

    boot:
      mode: uefi
      secureBoot: false

    podNetwork:
      enabled: false

    ports:
      - name: wg-2011
        port: 64763
        protocol: UDP
        expose: true
    
    disk:
      enabled: true

      size: 5Gi

    networks:
      - name: wan-home
        macAddress: '02:01:50:00:02:01'

      - name: home2-rt2