env: prod

installing: false

installers:
  - name: vyos
    url: https://github.com/vyos/vyos-nightly-build/releases/download/2026.07.11-0033-rolling/vyos-2026.07.11-0033-rolling-generic-amd64.iso
    size: 30Gi

  - name: flatcar
    url: https://stable.release.flatcar-linux.net/amd64-usr/current/flatcar_production_kubevirt_image.qcow2
    size: 30Gi

  # CDI archives and non-HTTP sources can be configured without changing the
  # templates. `url` remains shorthand for source.http.url.
  # - name: archived-rootfs
  #   size: 30Gi
  #   contentType: archive
  #   preallocation: true
  #   storageClassName: fast
  #   source:
  #     http:
  #       url: https://images.example.test/rootfs.tar.gz
  #       secretRef: image-download-credentials
  #       certConfigMap: image-download-ca
  #
  # Other CDI source types (registry, pvc, snapshot, blank, upload, and vddk)
  # may be supplied under `source`; DataSource references use `sourceRef`.

networks:
  - name: wan-home
    vlan: 150
    mtu: 1500
    type: sriov
    sriov:
      trust: true
      device: intel.com/intel_x540_dpdk

  - name: home2-rt2
    vlan: 20
    mtu: 9000
    type: sriov
    sriov:
      trust: true
      device: intel.com/intel_x540_dpdk

  - name: home2-rt2-alt1
    vlan: 21
    mtu: 9000
    type: sriov
    sriov:
      trust: true
      device: intel.com/intel_x540_dpdk

  - name: home2-rt1
    vlan: 30
    mtu: 9000
    type: sriov
    sriov:
      trust: true
      device: intel.com/intel_x540_dpdk

  - name: home2-rt1-alt1
    vlan: 31
    mtu: 9000
    type: sriov
    sriov:
      trust: true
      device: intel.com/intel_x540_dpdk

  - name: conntrack-sync
    vlan: 1000
    mtu: 1500
    type: sriov
    sriov:
      trust: true
      device: intel.com/intel_x540_dpdk

vms:
  - name: windows-lab
    installing: true

    installer: windows-11
    # The installer defaults to a SATA CD-ROM. KubeVirt disk-entry fields can
    # be customized with `type`, target-specific fields, and common `options`.
    # installerAttachment:
    #   type: cdrom                 # disk, cdrom, or lun
    #   bus: sata                   # shorthand for target.bus
    #   bootOrder: 1
    #   target:
    #     readonly: true
    #     tray: closed
    #   options:
    #     serial: windows-installer
    uefi: true

    boot:
      mode: uefi
      secureBoot: true

    tpm:
      enabled: true

    nodeSelector:
      kubernetes.io/hostname: 'hpc3'

    disk:
      enabled: true

      size: 128Gi
      # Attachment defaults to type=disk and bus=virtio. `target` accepts the
      # selected KubeVirt target's fields; `options` accepts common Disk fields
      # such as cache, io, serial, dedicatedIOThread, shareable, errorPolicy,
      # blockSize, and tag. Set `bootOrder` directly under `attachment`.
      # attachment:
      #   type: disk                # disk, cdrom, or lun
      #   bus: virtio               # shorthand for target.bus
      #   bootOrder: 2
      #   target:
      #     readonly: false
      #     pciAddress: "0000:81:01.0"
      #   options:
      #     cache: none
      #     io: native
      #     serial: windows-root
      # Optional CDI fields supported here include contentType (kubevirt or
      # archive), preallocation, storageClassName, volumeMode, accessModes,
      # priorityClassName, source, and sourceRef. `url` is HTTP shorthand.

    networks:
      - name: wan-home

  - name: wan-rt1
    installing: false
    disk:
      enabled: true

      size: 5Gi

    networks:
      - name: wan-home

  - name: wan-rt2
    installing: false

    boot:
      mode: uefi
      secureBoot: false

    podNetwork:
      enabled: false
      # macAddress: '02:00:00:00:00:01'

    ports:
      - name: wg-2011
        port: 64763
        protocol: UDP
        expose: true
    
    disk:
      enabled: true

      size: 5Gi

    networks:
      - name: wan-home
        macAddress: '02:01:50:00:02:01'

      - name: home2-rt2
