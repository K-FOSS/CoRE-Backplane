apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: main-gw
spec:
  targetSelectors:
    - group: gateway.networking.k8s.io
      kind: Gateway
      matchLabels:
        resolvemy.host/gw: 'main-gw'
        resolvemy.host/security: 'public'
        resolvemy.host/env: 'prod'

  connection:
    bufferLimit: 100M

  tcpKeepalive:
    idleTime: 5m
    interval: 15s
    probes: 9

  timeout:
    tcp:
      connectTimeout: 3s
    http:
      connectionIdleTimeout: 120s
      maxConnectionDuration: 0s

  http2:
    initialConnectionWindowSize: 32Mi
    initialStreamWindowSize: 4Mi
    maxConcurrentStreams: 200
    onInvalidMessage: TerminateStream
  
  loadBalancer:
    type: ConsistentHash
    
    consistentHash:
      tableSize: 65537
      type: SourceIP

  dns:
    dnsRefreshRate: 1m
    respectDnsTtl: true