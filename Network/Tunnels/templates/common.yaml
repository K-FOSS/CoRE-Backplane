---
{{- include "bjw-s.common.loader.init" . }}

{{/*
Convert the tc-compatible configured bandwidth to the Kbit/s value expected by
FRR's interface bandwidth command.
*/}}
{{- define "core-network-tunneler.bandwidthKbps" -}}
{{- $bandwidth := lower (toString .) -}}
{{- $value := regexFind "^[0-9]+" $bandwidth | int -}}
{{- if regexMatch "^[0-9]+(g|gbit|gbps)$" $bandwidth -}}
{{- mul $value 1000000 -}}
{{- else if regexMatch "^[0-9]+(m|mbit|mbps)$" $bandwidth -}}
{{- mul $value 1000 -}}
{{- else if regexMatch "^[0-9]+(k|kbit|kbps)?$" $bandwidth -}}
{{- $value -}}
{{- else if regexMatch "^[0-9]+(bit|bps)$" $bandwidth -}}
{{- div $value 1000 -}}
{{- else -}}
{{- fail (printf "unsupported bandwidth %q: use an integer with bit, kbit, mbit, or gbit units" .) -}}
{{- end -}}
{{- end }}

{{- define "app-template.hardcodedValues" -}}

# Set the nameOverride based on the release name if no override has been set
{{ if not .Values.global.nameOverride }}
global:
  nameOverride: "{{ .Release.Name }}"
{{ end }}

controllers:
  {{- range $tunIndex, $tunneler := .Values.tunnelers }}
  tunneler-{{ $tunneler.name }}:
    # For Deployments, valid values are Recreate (default) and RollingUpdate.
    # For StatefulSets, valid values are OnDelete and RollingUpdate (default).
    # DaemonSets/CronJobs ignore this.
    strategy: Recreate

    forceRename: {{ $.Release.Name }}-{{ $tunneler.name }}

    {{- $sriovUsed := false -}}
    {{- $sriovResources := dict -}}
    {{- range $netID, $netInterface := $tunneler.interfaces }}
    {{- if eq $netInterface.type "sriov" }}
    {{ $sriovUsed = true }}
    {{- 
      $device := required
          (printf "tunnelers.%s.interfaces.%d: sriov.device is required for SR-IOV interfaces" $tunneler.name $netID)
          $netInterface.sriov.device
    }}
    {{- $currentCount := get $sriovResources $device | default 0 }}
    {{- $_ := set $sriovResources $device (add $currentCount 1) }}
    {{- end }}
    {{- end }}

    pod:
      dnsPolicy: None

      automountServiceAccountToken: false

      {{- with (dig "pod" "labels" dict $tunneler) }}
      labels:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with $tunneler.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      dnsConfig:
        nameservers:
          - 1.1.1.1
        options:
          - name: ndots
            value: '0'
          - name: edns0

      {{- if $tunneler.interfaces }}
      {{- $additionalNetworks := list }}
      {{- range $netID, $netInterface := $tunneler.interfaces }}
      {{- if gt $netID 0 }}
      {{- $network := dict "name" (printf "net-%s-%s-%d" $.Release.Name $tunneler.name $netID) "interface" (printf "eth%d" $netID) }}
      {{- with $netInterface.macAddress }}
      {{- $_ := set $network "mac" . }}
      {{- end }}
      {{- $additionalNetworks = append $additionalNetworks $network }}
      {{- end }}
      {{- end }}
      annotations:
        v1.multus-cni.io/default-network: '{{ $.Release.Namespace }}/net-{{ $.Release.Name }}-{{ $tunneler.name }}-0'
        {{- if $additionalNetworks }}
        k8s.v1.cni.cncf.io/networks: {{ $additionalNetworks | toJson | quote }}
        {{- end }}
      {{- end }}

    {{- $ipTunnels := list }}
    {{- range $tunnel := $tunneler.tunnels }}
      {{- if or (eq $tunnel.type "gre") (eq $tunnel.type "vxlan") }}
        {{- $ipTunnels = append $ipTunnels $tunnel }}
      {{- end }}
    {{- end }}

    

    {{- $mtuNics := list }}
    {{- $offloadNics := list }}
    {{- $ringNics := list }}
    {{- $qdiscNics := list }}
    {{- $sourceRoutes := list }}
    {{- range $netID, $interface := $tunneler.interfaces }}
      {{- if .mtu  }}
        {{- $mtuNics = append $mtuNics (dict "interface" (printf "eth%d" $netID) "mtu" .mtu) }}
      {{- end }}
      {{- if .offload }}
        {{- $offloadNics = append $offloadNics (dict "interface" (printf "eth%d" $netID) "offload" .offload) }}
      {{- end }}
      {{- if .rings }}
        {{- $ringNics = append $ringNics (dict "interface" (printf "eth%d" $netID) "rings" .rings) }}
      {{- end }}
      {{- if and (eq .type "sriov") (or (eq $netID 0) (hasKey . "bandwidth") (hasKey . "qdisc")) }}
        {{- $qdisc := default "fq" .qdisc }}
        {{- $bandwidth := "" }}
        {{- if hasKey . "bandwidth" }}
          {{- $bandwidth = .bandwidth }}
        {{- else if eq $netID 0 }}
          {{- $bandwidth = "400mbit" }}
        {{- end }}
        {{- $qdiscNics = append $qdiscNics (dict "interface" (printf "eth%d" $netID) "qdisc" $qdisc "bandwidth" $bandwidth) }}
      {{- end }}
      {{- range $route := dig "ipam" "routes" (list) $interface }}
        {{- with $route.src }}
          {{- $sourceRoutes = append $sourceRoutes (dict "interface" (printf "eth%d" $netID) "route" $route) }}
        {{- end }}
      {{- end }}
    {{- end }}

    initContainers:
      net-tune:
        image:
          repository: {{ dig "nicConfig" "image" "repository" "nicolaka/netshoot" $tunneler }}
          tag: {{ dig "nicConfig" "image" "tag" "latest" $tunneler | quote }}
          pullPolicy: {{ dig "nicConfig" "image" "pullPolicy" "IfNotPresent" $tunneler }}

        securityContext:
          privileged: true

        command:
          - /bin/sh
          - -c
          - |
            set -eux

            sysctl -w net.core.netdev_max_backlog=250000 || true
            sysctl -w net.core.rmem_max=268435456 || true
            sysctl -w net.core.wmem_max=268435456 || true
            sysctl -w net.ipv4.udp_rmem_min=131072 || true
            sysctl -w net.ipv4.udp_wmem_min=131072 || true
            sysctl -w net.ipv4.tcp_mtu_probing=1 || true

            sysctl -a | egrep 'net.core.netdev_max_backlog|net.core.rmem_max|net.core.wmem_max|net.ipv4.udp_rmem_min|net.ipv4.udp_wmem_min|net.ipv4.tcp_mtu_probing'

      nicconfig:
        image:
          repository: {{ dig "nicConfig" "image" "repository" "nicolaka/netshoot" $tunneler }}
          tag: {{ dig "nicConfig" "image" "tag" "latest" $tunneler | quote }}
          pullPolicy: {{ dig "nicConfig" "image" "pullPolicy" "IfNotPresent" $tunneler }}

        securityContext:
          privileged: false
          allowPrivilegeEscalation: false
          runAsNonRoot: false
          readOnlyRootFilesystem: false
          capabilities:
            add:
              - NET_ADMIN
        
        command:
          - /bin/sh
          - -c
          - |
            ethtool eth0
            {{- if $ringNics }}
            {{- range $nic := $ringNics }}
            ethtool -g {{ $nic.interface }}
            {{- range $ring, $ringValue := $nic.rings }}
            ethtool -G {{ $nic.interface }} {{ $ring }} {{ $ringValue }}
            {{- end }}
            {{- end }}
            {{- end }}
            {{- if $offloadNics }}
            {{- range $nic := $offloadNics }}
            ethtool -k {{ $nic.interface }}
            {{- range $offload, $offloadValue := $nic.offload }}
            ethtool -K {{ $nic.interface }} {{ $offload }} {{ $offloadValue }}
            {{- end }}
            {{- end }}
            {{- end }}
            {{- if $mtuNics }}
            {{- range $nic := $mtuNics }}
            ip link set dev {{ $nic.interface }} mtu {{ $nic.mtu }}
            ip -d link show {{ $nic.interface }}
            {{- end }}
            {{- end }}
            {{- range $sourceRoute := $sourceRoutes }}
            ip route replace {{ required (printf "interface route on %s: dst is required when src is set" $sourceRoute.interface) $sourceRoute.route.dst }}{{ with $sourceRoute.route.gw }} via {{ . }}{{ end }} dev {{ $sourceRoute.interface }} src {{ $sourceRoute.route.src }}
            {{- end }}
      {{- if $ipTunnels }}
      tunnel-init:
        image:
          repository: {{ dig "tunnelInit" "image" "repository" "nicolaka/netshoot" $tunneler }}
          tag: {{ dig "tunnelInit" "image" "tag" "latest" $tunneler | quote }}
          pullPolicy: {{ dig "tunnelInit" "image" "pullPolicy" "IfNotPresent" $tunneler }}
        command:
          - /bin/sh
          - -ec
        args:
          - |
            {{- range $tunnel := $ipTunnels }}
            {{- if eq $tunnel.type "gre" }}
            ip link add {{ $tunnel.name }} type gre local {{ required (printf "GRE tunnel %q: local is required" $tunnel.name) $tunnel.local }} remote {{ required (printf "GRE tunnel %q: remote is required" $tunnel.name) $tunnel.remote }} ttl {{ default "inherit" $tunnel.ttl }}{{ with $tunnel.key }} key {{ . }}{{ end }}{{ with $tunnel.dev }} dev {{ . }}{{ end }}
              {{- with $tunnel.address }}
            ip address add {{ . }} dev {{ $tunnel.name }}
              {{- end }}
              {{- with $tunnel.mtu }}
            ip link set dev {{ $tunnel.name }} mtu {{ . }}
              {{- end }}
            ip link set dev {{ $tunnel.name }} up
            {{- else }}
            ip link add {{ $tunnel.name }} type vxlan id {{ required (printf "VXLAN tunnel %q: id is required" $tunnel.name) $tunnel.id }} dstport {{ default 4789 $tunnel.dstPort }}{{ with $tunnel.local }} local {{ . }}{{ end }}{{ if $tunnel.remote }} remote {{ $tunnel.remote }}{{ else if $tunnel.group }} group {{ $tunnel.group }}{{ end }}{{ with $tunnel.dev }} dev {{ . }}{{ end }}{{ if and (hasKey $tunnel "learning") (not $tunnel.learning) }} nolearning{{ end }}
              {{- with $tunnel.address }}
            ip address add {{ . }} dev {{ $tunnel.name }}
              {{- end }}
              {{- with $tunnel.mtu }}
            ip link set dev {{ $tunnel.name }} mtu {{ . }}
              {{- end }}
            ip link set dev {{ $tunnel.name }} up
            {{- end }}
            {{- range $route := $tunnel.routes }}
            ip route replace {{ $route.dst }} dev {{ $tunnel.name }}{{ with $route.via }} via {{ . }}{{ end }}
            {{- end }}
            {{- end }}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            add:
              - NET_ADMIN
          runAsNonRoot: false
          seccompProfile:
            type: RuntimeDefault
      {{- end }}

      {{- if or $qdiscNics $ipTunnels }}
      tunnel-qdisc-config:
        image:
          repository: {{ dig "nicConfig" "image" "repository" "nicolaka/netshoot" $tunneler }}
          tag: {{ dig "nicConfig" "image" "tag" "latest" $tunneler | quote }}
          pullPolicy: {{ dig "nicConfig" "image" "pullPolicy" "IfNotPresent" $tunneler }}
        command:
          - /bin/sh
          - -ec
        args:
          - |
            {{- range $nic := $qdiscNics }}
            tc qdisc replace dev {{ $nic.interface }} root {{ $nic.qdisc }}{{ with $nic.bandwidth }} maxrate {{ . }}{{ end }}
            {{- end }}
            {{- range $tunnel := $ipTunnels }}
            tc qdisc replace dev {{ $tunnel.name }} root {{ default "fq" $tunnel.qdisc }}{{ if hasKey $tunnel "bandwidth" }} maxrate {{ $tunnel.bandwidth }}{{ else }} maxrate 250mbit{{ end }}
            {{- end }}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            add:
              - NET_ADMIN
          runAsNonRoot: false
          seccompProfile:
            type: RuntimeDefault
      {{- end }}

    containers:
      {{- if not (and (hasKey $tunneler "frr") (hasKey $tunneler.frr "enabled") (not $tunneler.frr.enabled)) }}
      frr:
        image:
          repository: {{ dig "frr" "image" "repository" "quay.io/frrouting/frr" $tunneler }}
          tag: {{ dig "frr" "image" "tag" "10.6.1" $tunneler | quote }}
          pullPolicy: {{ dig "frr" "image" "pullPolicy" "IfNotPresent" $tunneler }}

        {{- if $sriovUsed }}
        resources:
          limits:
            {{- range $device, $count := $sriovResources }}
            {{ $device }}: {{ $count | quote }}
            {{- end }}
        {{- end }}

        securityContext:
          seLinuxOptions: {}
          privileged: false
          allowPrivilegeEscalation: false
          runAsNonRoot: false
          readOnlyRootFilesystem: false
          seccompProfile:
            type: "RuntimeDefault"
          capabilities:
            add: 
              - 'NET_ADMIN'
              - 'SYS_ADMIN'
      {{- end }}

      {{- $wireguardTunnels := list }}
      {{- range $tunnel := $tunneler.tunnels }}
        {{- if eq $tunnel.type "wireguard" }}
          {{- $wireguardTunnels = append $wireguardTunnels $tunnel }}
        {{- end }}
      {{- end }}
      {{- if $wireguardTunnels }}
      wireguard:
        image:
          repository: linuxserver/wireguard
          #
          # TODO: Get Renovate or similar managing this
          #
          tag: latest
          pullPolicy: IfNotPresent
        
        securityContext:
          seLinuxOptions: {}
          privileged: false
          allowPrivilegeEscalation: false
          runAsNonRoot: false
          readOnlyRootFilesystem: false
          seccompProfile:
            type: "RuntimeDefault"
          capabilities:
            add: 
              - 'NET_ADMIN'

        # -- Probe configuration
        # -- [[ref]](https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/)
        # @default -- See below
        probes:
          # -- Liveness probe configuration
          # @default -- See below
          liveness:
            # -- Enable the liveness probe
            enabled: false
            # -- Set this to `true` if you wish to specify your own livenessProbe
            custom: false
            # -- sets the probe type when not using a custom probe
            # @default -- "TCP"
            type: TCP
            # -- The spec field contains the values for the default livenessProbe.
            # If you selected `custom: true`, this field holds the definition of the livenessProbe.
            # @default -- See below
            spec:
              initialDelaySeconds: 0
              periodSeconds: 10
              timeoutSeconds: 1
              failureThreshold: 3

          # -- Redainess probe configuration
          # @default -- See below
          readiness:
            # -- Enable the readiness probe
            enabled: false
            # -- Set this to `true` if you wish to specify your own readinessProbe
            custom: false
            # -- sets the probe type when not using a custom probe
            # @default -- "TCP"
            type: TCP
            # -- The spec field contains the values for the default readinessProbe.
            # If you selected `custom: true`, this field holds the definition of the readinessProbe.
            # @default -- See below
            spec:
              initialDelaySeconds: 0
              periodSeconds: 10
              timeoutSeconds: 1
              failureThreshold: 3

          # -- Startup probe configuration
          # @default -- See below
          startup:
            # -- Enable the startup probe
            enabled: false
      {{- end }}
      {{- $frrDisabled := and (hasKey $tunneler "frr") (hasKey $tunneler.frr "enabled") (not $tunneler.frr.enabled) }}
      {{- if and $ipTunnels $frrDisabled (not $wireguardTunnels) }}
      tunnel-keeper:
        image:
          repository: {{ dig "tunnelInit" "image" "repository" "nicolaka/netshoot" $tunneler }}
          tag: {{ dig "tunnelInit" "image" "tag" "latest" $tunneler | quote }}
          pullPolicy: {{ dig "tunnelInit" "image" "pullPolicy" "IfNotPresent" $tunneler }}
        command:
          - /bin/sh
          - -c
          - exec sleep infinity
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            add:
              - NET_ADMIN
          runAsNonRoot: false
          seccompProfile:
            type: RuntimeDefault
      {{- end }}

  {{- end }}


persistence:
  {{- range $tunIndex, $tunneler := .Values.tunnelers }}
  {{- if not (and (hasKey $tunneler "frr") (hasKey $tunneler.frr "enabled") (not $tunneler.frr.enabled)) }}
  {{ $tunneler.name }}-frrconfig:
    enabled: true

    type: configMap

    identifier: {{ $tunneler.name }}-frrconfig

    defaultMode: 0755

    advancedMounts:
      tunneler-{{ $tunneler.name }}:
        frr:
          - path: /etc/frr/frr.conf
            readOnly: true
            subPath: frr.conf

          - path: /etc/frr/daemons
            readOnly: true
            subPath: daemons
  {{- end }}
  {{- $wireguardTunnels := list }}
  {{- range $tunnel := $tunneler.tunnels }}
    {{- if eq $tunnel.type "wireguard" }}
      {{- $wireguardTunnels = append $wireguardTunnels $tunnel }}
    {{- end }}
  {{- end }}
  {{- if $wireguardTunnels }}
  {{ $tunneler.name }}-tunnelconfigs:
    enabled: true
    type: configMap
    identifier: {{ $tunneler.name }}-tunnelconfigs
    defaultMode: 0600
    advancedMounts:
      tunneler-{{ $tunneler.name }}:
        wireguard:
          - path: /config/wg_confs
            readOnly: true
  {{- end }}
  {{- end }}


configMaps:
  {{- range $tunIndex, $tunneler := .Values.tunnelers }}

  {{- if not (and (hasKey $tunneler "frr") (hasKey $tunneler.frr "enabled") (not $tunneler.frr.enabled)) }}
  {{ $tunneler.name }}-frrconfig:
    enabled: true

    data:
      daemons: |
        # This file tells the frr package which daemons to start.
        #
        # Sample configurations for these daemons can be found in
        # /usr/share/doc/frr/examples/.
        #
        # ATTENTION:
        #
        # When activating a daemon for the first time, a config file, even if it is
        # empty, has to be present *and* be owned by the user and group "frr", else
        # the daemon will not be started by /etc/init.d/frr. The permissions should
        # be u=rw,g=r,o=.
        # When using "vtysh" such a config file is also needed. It should be owned by
        # group "frrvty" and set to ug=rw,o= though. Check /etc/pam.d/frr, too.
        #
        # The watchfrr, zebra and staticd daemons are always started.
        #
        bgpd={{ if dig "frr" "bgp" "enabled" true $tunneler }}yes{{ else }}no{{ end }}
        ospfd={{ if dig "frr" "ospf" "enabled" true $tunneler }}yes{{ else }}no{{ end }}
        ospf6d={{ if dig "frr" "ospf6" "enabled" false $tunneler }}yes{{ else }}no{{ end }}
        ripd=no
        ripngd=no
        isisd=no
        pimd=no
        ldpd=no
        nhrpd=no
        eigrpd=no
        babeld=no
        sharpd=no
        pbrd=no
        bfdd=no
        fabricd=no
        vrrpd=no
        pathd=no

        #
        # If this option is set the /etc/init.d/frr script automatically loads
        # the config via "vtysh -b" when the servers are started.
        # Check /etc/pam.d/frr if you intend to use "vtysh"!
        #
        vtysh_enable=yes
        zebra_options="  -A 127.0.0.1 -s 90000000"
        bgpd_options="-A 127.0.0.1"
        ospfd_options="  -A 127.0.0.1"
        ospf6d_options=" -A ::1"
        ripd_options="   -A 127.0.0.1"
        ripngd_options=" -A ::1"
        isisd_options="  -A 127.0.0.1"
        pimd_options="   -A 127.0.0.1"
        ldpd_options="   -A 127.0.0.1"
        nhrpd_options="  -A 127.0.0.1"
        eigrpd_options=" -A 127.0.0.1"
        babeld_options=" -A 127.0.0.1"
        sharpd_options=" -A 127.0.0.1"
        pbrd_options="   -A 127.0.0.1"
        staticd_options="-A 127.0.0.1"
        bfdd_options="   -A 127.0.0.1"
        fabricd_options="-A 127.0.0.1"
        vrrpd_options="  -A 127.0.0.1"
        pathd_options="  -A 127.0.0.1"

        # configuration profile
        #
        #frr_profile="traditional"
        #frr_profile="datacenter"

        #
        # This is the maximum number of FD's that will be available.
        # Upon startup this is read by the control files and ulimit
        # is called.  Uncomment and use a reasonable value for your
        # setup if you are expecting a large number of peers in
        # say BGP.
        #MAX_FDS=1024

        # The list of daemons to watch is automatically generated by the init script.
        #watchfrr_options=""

        # To make watchfrr create/join the specified netns, use the following option:
        #watchfrr_options="--netns"
        # This only has an effect in /etc/frr/<somename>/daemons, and you need to
        # start FRR with "/usr/lib/frr/frrinit.sh start <somename>".

        # for debugging purposes, you can specify a "wrap" command to start instead
        # of starting the daemon directly, e.g. to use valgrind on ospfd:
        #   ospfd_wrap="/usr/bin/valgrind"
        # or you can use "all_wrap" for all daemons, e.g. to use perf record:
        #   all_wrap="/usr/bin/perf record --call-graph -"
        # the normal daemon command is added to this at the end.

      frr.conf: |
        frr defaults traditional
        hostname {{ $tunneler.name }}
        log syslog {{ dig "frr" "logLevel" "informational" $tunneler }}
        service integrated-vtysh-config
        !
        {{- range $listName, $entries := $tunneler.frr.prefixLists }}
        {{- range $index, $entry := $entries }}
        ip prefix-list {{ $listName }} seq {{ default (mul (add $index 1) 10) $entry.seq }} {{ default "permit" $entry.action }} {{ $entry.prefix }}{{ with $entry.ge }} ge {{ . }}{{ end }}{{ with $entry.le }} le {{ . }}{{ end }}
        {{- end }}
        {{- end }}
        !
        {{- range $netId, $netInterface := $tunneler.interfaces }}
        {{- $interfaceBandwidth := "" }}
        {{- if hasKey $netInterface "bandwidth" }}
        {{- $interfaceBandwidth = $netInterface.bandwidth }}
        {{- else if and (eq $netId 0) (eq $netInterface.type "sriov") }}
        {{- $interfaceBandwidth = "400mbit" }}
        {{- end }}
        !
        {{- if or $netInterface.routing $interfaceBandwidth }}
        interface eth{{ $netId }}
          {{- with $interfaceBandwidth }}
          bandwidth {{ include "core-network-tunneler.bandwidthKbps" . }}
          {{- end }}
          {{- with $ospf := $netInterface.routing.ospf }}
          {{- if $ospf.enabled }}
          ip ospf area {{ default "0.0.0.0" $ospf.area }}
          ip ospf network {{ default "broadcast" $ospf.type }}
          
          {{- with $ospf.priority }}
          ip ospf priority {{ . }}
          {{- end }}

          {{- with $ospf.hello }}
          ip ospf hello-interval {{ . }}
          {{- end }}

          {{- with $ospf.dead }}
          ip ospf dead-interval {{ . }}
          {{- end }}

          {{- if $ospf.passive }}
          ip ospf passive
          {{- end }}
          {{- end }}
          {{- end }}
          {{- with $ospf6 := $netInterface.routing.ospf6 }}
          {{- if not (and (hasKey $ospf6 "enabled") (not $ospf6.enabled)) }}
          ipv6 ospf6 area {{ default "0.0.0.0" $ospf6.area }}
          {{- with $ospf6.cost }}
          ipv6 ospf6 cost {{ . }}
          {{- end }}
          {{- with $ospf6.hello }}
          ipv6 ospf6 hello-interval {{ . }}
          {{- end }}
          {{- with $ospf6.dead }}
          ipv6 ospf6 dead-interval {{ . }}
          {{- end }}
          {{- if $ospf6.passive }}
          ipv6 ospf6 passive
          {{- end }}
          {{- end }}
          {{- end }}
        exit
        !
        {{- end }}
        {{- end }} 
        !
        {{- $wireguardIndex := 0 }}
        {{- range $tunnel := $tunneler.tunnels }}
        {{- $interfaceName := $tunnel.name }}
        {{- if eq $tunnel.type "wireguard" }}
        {{- $interfaceName = printf "wg-%d" $wireguardIndex }}
        {{- $wireguardIndex = add1 $wireguardIndex }}
        {{- end }}
        {{- $tunnelBandwidth := default "250mbit" $tunnel.bandwidth }}
        interface {{ $interfaceName }}
          bandwidth {{ include "core-network-tunneler.bandwidthKbps" $tunnelBandwidth }}
          {{- with $ospf := $tunnel.ospf }}
          {{- if not (and (hasKey $ospf "enabled") (not $ospf.enabled)) }}
          ip ospf area {{ default "0.0.0.0" $tunnel.ospf.area }}
          ip ospf network {{ default "point-to-point" $ospf.type }}
          {{- with $ospf.cost }}
          ip ospf cost {{ . }}
          {{- end }}
          {{- with $ospf.priority }}
          ip ospf priority {{ . }}
          {{- end }}
          {{- with $ospf.hello }}
          ip ospf hello-interval {{ . }}
          {{- end }}
          {{- with $ospf.dead }}
          ip ospf dead-interval {{ . }}
          {{- end }}
          {{- with $ospf.retransmit }}
          ip ospf retransmit-interval {{ . }}
          {{- end }}
          {{- with $ospf.transmitDelay }}
          ip ospf transmit-delay {{ . }}
          {{- end }}
          {{- if $ospf.mtuIgnore }}
          ip ospf mtu-ignore
          {{- end }}
          {{- if $ospf.passive }}
          ip ospf passive
          {{- end }}
          {{- with $ospf.rawConfig }}
          {{ . | nindent 10 }}
          {{- end }}
          {{- end }}
          {{- end }}
          {{- with $ospf6 := $tunnel.ospf6 }}
          {{- if not (and (hasKey $ospf6 "enabled") (not $ospf6.enabled)) }}
          ipv6 ospf6 area {{ default "0.0.0.0" $ospf6.area }}
          ipv6 ospf6 network {{ default "point-to-point" $ospf6.type }}
          {{- with $ospf6.cost }}
          ipv6 ospf6 cost {{ . }}
          {{- end }}
          {{- with $ospf6.priority }}
          ipv6 ospf6 priority {{ . }}
          {{- end }}
          {{- with $ospf6.hello }}
          ipv6 ospf6 hello-interval {{ . }}
          {{- end }}
          {{- with $ospf6.dead }}
          ipv6 ospf6 dead-interval {{ . }}
          {{- end }}
          {{- with $ospf6.retransmit }}
          ipv6 ospf6 retransmit-interval {{ . }}
          {{- end }}
          {{- with $ospf6.transmitDelay }}
          ipv6 ospf6 transmit-delay {{ . }}
          {{- end }}
          {{- with $ospf6.mtu }}
          ipv6 ospf6 ifmtu {{ . }}
          {{- end }}
          {{- if $ospf6.mtuIgnore }}
          ipv6 ospf6 mtu-ignore
          {{- end }}
          {{- if $ospf6.passive }}
          ipv6 ospf6 passive
          {{- end }}
          {{- with $ospf6.rawConfig }}
          {{ . | nindent 10 }}
          {{- end }}
          {{- end }}
          {{- end }}
        exit
        !
        {{- end }}
        {{- if dig "frr" "bgp" "enabled" true $tunneler }}
        router bgp {{ dig "frr" "bgp" "asn" 64513 $tunneler }}
          bgp router-id {{ dig "frr" "routerId" "10.1.1.140" $tunneler }}
          no bgp ebgp-requires-policy
          bgp bestpath peer-type multipath-relax
          {{- $bgpNeighbors := default (list) $tunneler.frr.bgp.neighbors }}
          {{- $wireguardIndex := 0 }}
          {{- range $tunnel := $tunneler.tunnels }}
          {{- $interfaceName := $tunnel.name }}
          {{- if eq $tunnel.type "wireguard" }}
          {{- $interfaceName = printf "wg-%d" $wireguardIndex }}
          {{- $wireguardIndex = add1 $wireguardIndex }}
          {{- end }}
          {{- with $neighbor := $tunnel.bgp }}
          {{- if not (and (hasKey $neighbor "enabled") (not $neighbor.enabled)) }}
          {{- $bgpNeighbors = append $bgpNeighbors (merge (dict "_tunnelInterface" $interfaceName) (deepCopy $neighbor)) }}
          {{- end }}
          {{- end }}
          {{- end }}
          {{- range $neighbor := $bgpNeighbors }}
          {{- $neighborId := default $neighbor._tunnelInterface $neighbor.address }}
          neighbor {{ $neighborId }}{{ if and $neighbor._tunnelInterface (not $neighbor.address) }} interface{{ end }} remote-as {{ $neighbor.asn }}
          {{- with $neighbor.description }}
          neighbor {{ $neighborId }} description {{ . }}
          {{- end }}
          {{- with $neighbor.password }}
          neighbor {{ $neighborId }} password {{ . }}
          {{- end }}
          {{- end }}
          !
          address-family ipv4 unicast
            maximum-paths {{ dig "frr" "bgp" "maximumPaths" 64 $tunneler }}
            {{- range $protocol := $tunneler.frr.bgp.redistribute }}
            redistribute {{ $protocol }}
            {{- end }}
            {{- range $network := $tunneler.frr.bgp.networks }}
            network {{ $network }}
            {{- end }}
            {{- range $neighbor := $bgpNeighbors }}
            {{- $neighborId := default $neighbor._tunnelInterface $neighbor.address }}
            neighbor {{ $neighborId }} activate
            {{- with $neighbor.routeMapIn }}
            neighbor {{ $neighborId }} route-map {{ . }} in
            {{- end }}
            {{- with $neighbor.routeMapOut }}
            neighbor {{ $neighborId }} route-map {{ . }} out
            {{- end }}
            {{- end }}
          exit-address-family
        exit
        !
        {{- end }}
        {{- if dig "frr" "ospf" "enabled" true $tunneler }}
        router ospf
          ospf router-id {{ dig "frr" "routerId" "10.1.1.140" $tunneler }}
          auto-cost reference-bandwidth {{ dig "frr" "ospf" "referenceBandwidth" 100000 $tunneler }}
          {{- range $protocol := $tunneler.frr.ospf.redistribute }}
          redistribute {{ $protocol }}
          {{- end }}
        exit
        !
        {{- end }}
        {{- if dig "frr" "ospf6" "enabled" false $tunneler }}
        router ospf6
          ospf router-id {{ dig "frr" "routerId" "10.1.1.140" $tunneler }}
          auto-cost reference-bandwidth {{ dig "frr" "ospf6" "referenceBandwidth" 100000 $tunneler }}
          graceful-restart
          graceful-restart helper enable
          {{- range $protocol := $tunneler.frr.ospf6.redistribute }}
          redistribute {{ $protocol }}
          {{- end }}
        exit
        !
        {{- end }}
        {{- with $tunneler.frr.rawConfig }}
        {{ . | nindent 8 }}
        {{- end }}
        end
  {{- end }}

  {{- $wireguardTunnels := list }}
  {{- range $tunnel := $tunneler.tunnels }}
    {{- if eq $tunnel.type "wireguard" }}
      {{- $wireguardTunnels = append $wireguardTunnels $tunnel }}
    {{- end }}
  {{- end }}
  {{- if $wireguardTunnels }}
  {{ $tunneler.name }}-tunnelconfigs:
    enabled: true

    data:
      {{- range $tunnelIndex, $tunnel := $wireguardTunnels }}
      wg-{{ $tunnelIndex }}.conf: |
        [Interface]
        ListenPort = {{ required (printf "tunneler %q tunnel %q: port is required" $tunneler.name $tunnel.name) $tunnel.port }}
        {{- with $tunnel.address }}
        Address = {{ . }}
        {{- end }}
        {{- with $tunnel.privateKey }}
        PrivateKey = {{ . }}
        {{- end }}
        MTU = {{ default 1420 $tunnel.mtu }}
        Table = {{ default "off" $tunnel.table }}
        PostUp = tc qdisc replace dev %i root {{ default "fq" $tunnel.qdisc }}{{ if hasKey $tunnel "bandwidth" }} maxrate {{ $tunnel.bandwidth }}{{ else }} maxrate 250mbit{{ end }}

      {{- range $peerIndex, $peer := $tunnel.peers }}
        [Peer]
        # Name = {{ $peer.name }}
        PublicKey = {{ required (printf "tunneler %q tunnel %q peer %d: publicKey is required" $tunneler.name $tunnel.name $peerIndex) $peer.publicKey }}
        AllowedIPs = {{ required (printf "tunneler %q tunnel %q peer %d: allowedIPs is required" $tunneler.name $tunnel.name $peerIndex) $peer.allowedIPs | join "," }}
        {{- with $peer.presharedKey }}
        PresharedKey = {{ . }}
        {{- end }}
        {{- with $peer.endpoint }}
        Endpoint = {{ . }}
        {{- end }}
        {{- with $peer.persistentKeepalive }}
        PersistentKeepalive = {{ . }}
        {{- end }}

      {{- end }}
      {{- end }}
  {{- end }}
  {{- end }}


service:
  {{- range $tunneler := .Values.tunnelers }}
  {{- range $tunnel := $tunneler.tunnels }}
  {{- if and (eq $tunnel.type "wireguard") $tunnel.service $tunnel.service.enabled }}
  {{ $tunneler.name }}-{{ $tunnel.name }}:
    # -- Enables or disables the service
    enabled: true
    forceRename: {{ $.Release.Name }}-{{ $tunneler.name }}-{{ $tunnel.name }}

    # -- Configure which controller this service should target
    controller: tunneler-{{ $tunneler.name }}

    # -- Make this the primary service for this controller (used in probes, notes, etc...).
    # If there is more than 1 service targeting the controller, make sure that only 1 service is
    # marked as primary.
    primary: false

    # -- Set the service type
    type: {{ default "ClusterIP" $tunnel.service.type }}

    # -- Specify the externalTrafficPolicy for the service. Options: Cluster, Local
    # -- [[ref](https://kubernetes.io/docs/tutorials/services/source-ip/)]
    {{- with $tunnel.service.externalTrafficPolicy }}
    externalTrafficPolicy: {{ . }}
    {{- end }}
    {{- with $tunnel.service.annotations }}
    annotations:
      {{ nindent 6 (toYaml .) }}
    {{- end }}

    # -- Allow adding additional match labels
    extraSelectorLabels: {}

    ports:
      wireguard:
        # -- Enables or disables the port
        enabled: true

        # -- Make this the primary port (used in probes, notes, etc...)
        # If there is more than 1 service, make sure that only 1 port is marked as primary.
        primary: false

        # -- The port number
        port: {{ $tunnel.port }}

        # -- Port protocol.
        # Support values are `HTTP`, `HTTPS`, `TCP` and `UDP`.
        # HTTP and HTTPS spawn a TCP service and get used for internal URL and name generation
        protocol: UDP

        # -- Specify the appProtocol value for the Service.
        # [[ref]](https://kubernetes.io/docs/concepts/services-networking/service/#application-protocol)
        appProtocol:
  {{- end }}
  {{- end }}
  {{- end }}


{{- end -}}
{{- $_ := mergeOverwrite .Values (include "app-template.hardcodedValues" . | fromYaml) -}}

{{- range $tunIndex, $tunneler := .Values.tunnelers }}
{{- range $netID, $netInterface := $tunneler.interfaces }}
---
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: net-{{ $.Release.Name }}-{{ $tunneler.name }}-{{ $netID }}

  {{ if eq $netInterface.type "sriov" }}
  annotations:
    k8s.v1.cni.cncf.io/resourceName: {{ $netInterface.sriov.device }}
  {{ end }}
spec:
  config: |
    {{- $plugin := dict "type" $netInterface.type "vlan" $netInterface.sriov.vlan }}
    {{- if eq $netInterface.type "sriov" }}
    {{- $_ := set $plugin "spoofchk" "off" }}
    {{- end }}
    {{- with $netInterface.mtu }}
    {{- $_ := set $plugin "mtu" . }}
    {{- end }}
    {{- if $netInterface.ipam }}
    {{- $ipam := dict "type" "static" }}
    {{- with $netInterface.ipam.routes }}
    {{- $routes := list }}
    {{- range $route := . }}
    {{- $routes = append $routes (omit $route "src") }}
    {{- end }}
    {{- $_ := set $ipam "routes" $routes }}
    {{- end }}
    {{- $addresses := list }}
    {{- range $address := default (list $netInterface.ipam.address) $netInterface.ipam.addresses }}
    {{- $addresses = append $addresses (dict "address" (required (printf "tunnelers.%s.interfaces.%d: each IPAM address is required" $tunneler.name $netID) $address)) }}
    {{- end }}
    {{- $_ := set $ipam "addresses" $addresses }}
    {{- $_ := set $plugin "ipam" $ipam }}
    {{- end }}
    {{- $config := dict "cniVersion" "1.0.0" "name" (printf "vlan%v" $netInterface.sriov.vlan) }}
    {{- with $netInterface.tuning }}
    {{- $tuning := deepCopy . }}
    {{- $_ := set $tuning "type" "tuning" }}
    {{- $_ := set $config "plugins" (list $plugin $tuning) }}
    {{- else }}
    {{- $_ := merge $config $plugin }}
    {{- end }}
    {{ $config | toJson }}
---
{{ end }}
{{ end }}


