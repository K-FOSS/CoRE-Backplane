tunnelers:
  - name: yvr-tunneler1
    pod:
      labels: {}
    affinity: {}
    interfaces:
      - type: sriov
        # Optional MAC address requested from Multus for the default network.
        macAddress: 02:00:00:00:00:01
        mtu: 9000
        routing:
          ospf:
            enabled: false
        ipam:
          address: 10.7.7.61/24
          routes:
            - dst: 0.0.0.0/0
              gw: 10.7.7.1
        sriov:
          vlan: 666
          device: mellanox.com/mlx4_cx3_netdevice
      # Additional interfaces are attached as Multus secondary networks.
      # - type: sriov
      #   macAddress: 02:00:00:00:00:02
      #   mtu: 9000
      #   ipam:
      #     address: 10.7.8.61/24
      #   sriov:
      #     vlan: 667
      #     device: mellanox.com/mlx4_cx3_netdevice

    frr:
      enabled: true
      routerId: 10.7.7.61
      logLevel: informational
      image:
        repository: quay.io/frrouting/frr
        tag: 10.6.1
        pullPolicy: IfNotPresent
      bgp:
        enabled: true
        asn: 64513
        maximumPaths: 64
        redistribute:
          - connected
          - ospf
        networks: []
        neighbors: []
      ospf:
        enabled: true
        referenceBandwidth: 100
        redistribute:
          - connected
          - bgp
      ospf6:
        enabled: false
      prefixLists: {}
      rawConfig: ""

    tunnels:
      - name: yvr-tunneler1-gre1
        type: gre
        local: 10.7.7.61
        remote: 10.7.7.62
        address: 172.31.99.1/30
        mtu: 1476
        ttl: 255
        ospf:
          area: 0.0.0.0
          cost: 10
        routes: []

      - name: yvr-tunneler1-vxlan1
        type: vxlan
        id: 100
        local: 10.7.7.61
        remote: 10.7.7.62
        dstPort: 4789
        address: 172.31.100.1/30
        mtu: 1450
        learning: true
        routes: []

      - name: test
        type: wireguard
        port: 5123
        peers:
          - name: augy-ipad-pro.otg.resolvemy.host
            publicKey: INSERT_WG_PUBLIC_KEY
            allowedIPs:
              - 172.31.98.2/32
