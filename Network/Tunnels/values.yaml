tunnelers:
  - name: yvr-tunneler1
    pod:
      labels: {}
    affinity: {}
    # nicconfig:
    #   image:
    #     repository: nicolaka/netshoot
    #     tag: latest
    #     pullPolicy: IfNotPresent
      
    interfaces:
      - type: sriov
        # Optional MAC address requested from Multus for the default network.
        macAddress: 02:00:00:00:00:01
        mtu: 9000
        rings:
          tx: 1024
          rx: 1024
        offload:
          rx-udp-gro-forwarding: 'on'
        # Optional tuning CNI configuration. When set, the NIC plugin and
        # tuning plugin are emitted as a chained CNI plugin list.
        tuning:
          sysctl:
            net.core.netdev_max_backlog: "250000"
            net.core.rmem_max: "268435456"
            net.core.wmem_max: "268435456"
            net.ipv4.udp_rmem_min: "8192"
            net.ipv4.udp_wmem_min: "8192"
        routing:
          ospf:
            enabled: false
        ipam:
          addresses:
            - 10.7.7.61/24
            # - 2001:db8:7::61/64
          routes:
            - dst: 0.0.0.0/0
              gw: 10.7.7.1
              # Optional. Reapplied by the nicconfig init container because
              # static CNI IPAM does not support selecting a route source.
              # src: 10.7.7.61
        sriov:
          vlan: 666
          device: mellanox.com/mlx4_cx3_netdevice
      # Additional interfaces are attached as Multus secondary networks.
      - type: sriov
        macAddress: 02:00:00:00:00:02
        mtu: 9000
        ipam:
          address: 10.7.8.61/24
        sriov:
          vlan: 667
          device: mellanox.com/mlx4_cx3_netdevice

    frr:
      enabled: true
      routerId: 10.7.7.61
      logLevel: informational
      image:
        repository: quay.io/frrouting/frr
        tag: 10.6.1
        pullPolicy: IfNotPresent
      bgp:
        enabled: true
        asn: 64513
        maximumPaths: 64
        redistribute:
          - connected
          - ospf
        networks: []
        neighbors: []
      ospf:
        enabled: true
        referenceBandwidth: 100
        redistribute:
          - connected
          - bgp
      ospf6:
        enabled: true
      prefixLists: {}
      rawConfig: ""

    tunnels:
      - name: yvr-tunneler1-gre1
        type: gre
        local: 10.7.7.61
        remote: 10.7.7.62
        address: 172.31.99.1/30
        mtu: 1476
        ttl: 255
        ospf:
          area: 0.0.0.0
          cost: 10
          # enabled: true
          # type: point-to-point
          # priority: 1
          # hello: 10
          # dead: 40
          # retransmit: 5
          # transmitDelay: 1
          # mtuIgnore: false
          # passive: false
          # rawConfig: ""
        # OSPFv3 is configured independently from IPv4 OSPF.
        # ospf6:
        #   area: 0.0.0.0
        #   cost: 10
        #   enabled: true
        #   type: point-to-point
        #   priority: 1
        #   hello: 10
        #   dead: 40
        #   retransmit: 5
        #   transmitDelay: 1
        #   mtu: 1476
        #   mtuIgnore: false
        #   passive: false
        #   rawConfig: ""
        # A tunnel-local BGP neighbor is merged with frr.bgp.neighbors.
        # Omit address to use interface-based (unnumbered) BGP. WireGuard
        # interfaces use their generated wg-<index> runtime name.
        # bgp:
        #   address: 172.31.99.2
        #   asn: 64514
        routes: []

      - name: yvr-tunneler1-vxlan1
        type: vxlan
        id: 100
        local: 10.7.7.61
        remote: 10.7.7.62
        dstPort: 4789
        address: 172.31.100.1/30
        mtu: 1450
        learning: true
        routes: []

      - name: test
        type: wireguard
        port: 5123
        ospf6:
          area: 0.0.0.0
          cost: 10
        peers:
          - name: augy-ipad-pro.otg.resolvemy.host
            publicKey: INSERT_WG_PUBLIC_KEY
            address: 10.1.1.2
            allowedIPs:
              - 172.31.98.2/32
