tunnelers:
  - name: yvr-tunneler1
    pod:
      labels: {}
    affinity: {}
    # nicconfig:
    #   image:
    #     repository: nicolaka/netshoot
    #     tag: latest
    #     pullPolicy: IfNotPresent
      
    interfaces:
      - type: sriov
        # The first SR-IOV CNI interface defaults to fq at 400mbit.
        # Set qdisc and bandwidth on any SR-IOV interface to override it.
        # CAKE uses its native "bandwidth" option instead of fq's "maxrate".
        qdisc: htb
        bandwidth: 600mbit
        qdiscHandle: "1:"
        qdiscOptions: default 10
        priorityQueues:
          - name: priority
            parent: "1:"
            classid: "1:10"
            rate: 600mbit
            ceil: 800mbit
            burst: 4mb
            cburst: 4mb
            handle: "10:"
            qdisc: fq_codel
            options: limit 10000 flows 1024 quantum 1514 target 5ms interval 100ms ecn
        # Classify selected traffic into a named priority queue. `classId` may
        # be used instead of `tier` when the target class is not named.
        # `filters` is accepted as an alias for `trafficRules`.
        trafficRules:
          - parent: "1:"
            protocol: ip
            priority: 10
            classifier: flower
            tier: priority
            match:
              # Standard DSCP codepoint; 46 is Expedited Forwarding (EF).
              # The generated ip_tos match preserves the packet's ECN bits.
              dscp: 46
              ipProtocol: udp
              destinationPort: 51820
        # Other supported matches include sourceIp, destinationIp, sourcePort,
        # sourceMac, destinationMac, ecn, vlanPcp, vlanId, firewallMark,
        # encKeyId, encSourceIp, encDestinationIp, and raw.
        # Rules may set drop, police, setMark, setPriority, mirred, or
        # rawActions. Hardware/software-only classification is opt-in through
        # skipHw and skipSw.
        # Additional root qdisc arguments, for example:
        # qdiscOptions: diffserv4 triple-isolate nat wash
        #
        # Child qdiscs can be attached to traffic classes created by a root
        # qdisc such as mqprio. Each child supports qdisc, bandwidth, handle,
        # and arbitrary options independently:
        # qdisc: mqprio
        # bandwidth: null
        # qdiscHandle: "1:"
        # qdiscOptions: num_tc 3 map 0 1 2 2 2 2 2 2 queues 1@0 1@1 2@2 hw 1
        # priorityQueues:
        #   - parent: "1:1"
        #     handle: "10:"
        #     qdisc: cake
        #     bandwidth: 100mbit
        #     options: besteffort
        #   - parent: "1:2"
        #     handle: "20:"
        #     qdisc: cake
        #     bandwidth: 200mbit
        #     options: diffserv4
        #
        # Classful qdiscs such as HTB can define classes and one child qdisc
        # per class. See the secondary SR-IOV interface below for a complete
        # renderable example.
        # Optional MAC address requested from Multus for the default network.
        macAddress: 02:00:00:00:00:01
        mtu: 9000
        rings:
          tx: 1024
          rx: 1024
        offload:
          rx-udp-gro-forwarding: 'on'
        # Optional tuning CNI configuration. When set, the NIC plugin and
        # tuning plugin are emitted as a chained CNI plugin list.
        tuning:
          sysctl:
            net.core.netdev_max_backlog: "250000"
            net.core.rmem_max: "268435456"
            net.core.wmem_max: "268435456"
            net.ipv4.udp_rmem_min: "8192"
            net.ipv4.udp_wmem_min: "8192"
        routing:
          ospf:
            enabled: false
        ipam:
          addresses:
            - 10.7.7.61/24
            # - 2001:db8:7::61/64
          routes:
            - dst: 0.0.0.0/0
              gw: 10.7.7.1
              # Optional. Reapplied by the nicconfig init container because
              # static CNI IPAM does not support selecting a route source.
              # src: 10.7.7.61
        sriov:
          vlan: 666
          device: mellanox.com/mlx4_cx3_netdevice
      # Additional interfaces are attached as Multus secondary networks.
      - type: sriov
        # Secondary CNI interfaces have no implicit qdisc or bandwidth.
        # qdisc: fq
        # bandwidth: 400mbit
        qdisc: htb
        bandwidth: null
        qdiscHandle: "1:"
        qdiscOptions: default 10
        classes:
          - parent: "1:"
            classid: "1:10"
            rate: 48mbit
            ceil: 48mbit
            options: burst 64k cburst 64k

            child:
              handle: "10:"
              qdisc: fq_codel
              options: limit 10000 flows 1024 target 5ms interval 100ms ecn
        macAddress: 02:00:00:00:00:02
        mtu: 9000
        ipam:
          address: 10.7.8.61/24
        sriov:
          vlan: 667
          device: mellanox.com/mlx4_cx3_netdevice

    frr:
      enabled: true
      routerId: 10.7.7.61
      logLevel: informational
      image:
        repository: quay.io/frrouting/frr
        tag: 10.6.1
        pullPolicy: IfNotPresent
      bgp:
        enabled: true
        asn: 64513
        maximumPaths: 64
        redistribute:
          - connected
          - ospf
        networks: []
        neighbors: []
      ospf:
        enabled: true
        referenceBandwidth: 100
        redistribute:
          - connected
          - bgp
      ospf6:
        enabled: true
      prefixLists: {}
      rawConfig: ""

    tunnels:
      - name: yvr-tunneler1-gre1
        type: gre
        # Tunnel endpoints default to fq at 250mbit.
        qdisc: fq
        bandwidth: 250mbit
        local: 10.7.7.61
        remote: 10.7.7.62
        address: 172.31.99.1/30
        mtu: 1476
        ttl: 255
        ospf:
          area: 0.0.0.0
          cost: 10
          # enabled: true
          # type: point-to-point
          # priority: 1
          # hello: 10
          # dead: 40
          # retransmit: 5
          # transmitDelay: 1
          # mtuIgnore: false
          # passive: false
          # rawConfig: ""
        # OSPFv3 is configured independently from IPv4 OSPF.
        # ospf6:
        #   area: 0.0.0.0
        #   cost: 10
        #   enabled: true
        #   type: point-to-point
        #   priority: 1
        #   hello: 10
        #   dead: 40
        #   retransmit: 5
        #   transmitDelay: 1
        #   mtu: 1476
        #   mtuIgnore: false
        #   passive: false
        #   rawConfig: ""
        # A tunnel-local BGP neighbor is merged with frr.bgp.neighbors.
        # Omit address to use interface-based (unnumbered) BGP. WireGuard
        # interfaces use their generated wg-<index> runtime name.
        # bgp:
        #   address: 172.31.99.2
        #   asn: 64514
        routes: []

      - name: yvr-tunneler1-vxlan1
        type: vxlan
        id: 100
        local: 10.7.7.61
        remote: 10.7.7.62
        dstPort: 4789
        address: 172.31.100.1/30
        mtu: 1450
        learning: true
        routes: []

      - name: test
        type: wireguard
        # Optional for client-only tunnels. Required when service.enabled is true.
        port: 5123
        ospf6:
          area: 0.0.0.0
          cost: 10
        peers:
          - name: augy-ipad-pro.otg.resolvemy.host
            publicKey: INSERT_WG_PUBLIC_KEY
            address: 10.1.1.2
            allowedIPs:
              - 172.31.98.2/32
