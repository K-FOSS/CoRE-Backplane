frr:
  defaultVersion: v8.3.1

routeservers:
  rs0:
    ipAddress: 1.1.1.1

    networking:
      sriov:
        enabled: true

        vlan: 666

        address: 10.7.7.61/24

        gateway: 10.7.7.1

        device: mellanox.com/mlx4_cx3_netdevice

    ospf:
      enabled: false

      autocost:
        refBandwidth: 100000

    bgp:
      enabled: true

      asn: 64567

      afi:
        ipv4:
          unicast:
            neighbor:
              - name: frr-gw
                action: activate

      peers:
        - address: 172.31.192.16
          # remoteASN: ''

          eBGPMultihop: 6

          softReconfiguration: true

          peerGroup: frr-gw

      peerGroups:
        - name: frr-gw
          asn: 64567
          ebgpmultihop: 6
          ipv4:
            enabled: true
            softReconfiguration: true


    frr:
      version: 10.5.1