---
{{- include "bjw-s.common.loader.init" . }}

{{- define "routeserver.bandwidthMbps" -}}
{{- $value := regexFind "^[0-9]+" (toString .) -}}
{{- if hasSuffix "gbit" (toString .) -}}
{{- mul (int $value) 1000 -}}
{{- else -}}
{{- $value -}}
{{- end -}}
{{- end -}}

{{- define "app-template.hardcodedValues" -}}
# Set the nameOverride based on the release name if no override has been set
{{ if not .Values.global.nameOverride }}
global:
  nameOverride: "{{ .Release.Name }}"

{{ end }}

controllers:

{{/* $. is the top-level context.
     $name  -> "rs0", "rs1", ...
     $rs    -> the whole rs0/rs1 map (ipAddress, peers, peerGroups …) */}}
{{- range $name, $rs := .Values.routeservers }}
  {{ $name }}-routeserver:
    # For Deployments, valid values are Recreate (default) and RollingUpdate.
    # For StatefulSets, valid values are OnDelete and RollingUpdate (default).
    # DaemonSets/CronJobs ignore this.
    strategy: Recreate

    nameOverride: {{ $name }}

    {{- $sriovUsed := false -}}
    {{- $sriovResources := dict -}}
    {{- range $netID, $netInterface := $rs.networking.interfaces }}
    {{- if eq $netInterface.type "sriov" }}
    {{ $sriovUsed = true }}
    {{- 
      $device := required
          (printf "routeservers.%s.interfaces.%d: sriov.device is required for SR-IOV interfaces" $name $netID)
          $netInterface.sriov.device
    }}
    {{- $currentCount := get $sriovResources $device | default 0 }}
    {{- $_ := set $sriovResources $device (add $currentCount 1) }}
    {{- end }}
    {{- end }}

    {{- $configuredInterfaces := list -}}
    {{- $qdiscInterfaces := list -}}
    {{- range $netID, $netInterface := $rs.networking.interfaces }}
    {{- $configuredInterfaces = append $configuredInterfaces (dict "name" (printf "eth%d" $netID) "config" $netInterface) }}
    {{- if or (hasKey $netInterface "qdisc") (hasKey $netInterface "bandwidth") (hasKey $netInterface "classes") (hasKey $netInterface "priorityQueues") (hasKey $netInterface "trafficRules") (hasKey $netInterface "filters") }}
    {{- $qdiscInterfaces = append $qdiscInterfaces (dict "name" (printf "eth%d" $netID) "config" $netInterface) }}
    {{- end }}
    {{- end }}
    {{- if $configuredInterfaces }}
    initContainers:
      nicconfig:
        image:
          repository: {{ dig "nicConfig" "image" "repository" "nicolaka/netshoot" $rs }}
          tag: {{ dig "nicConfig" "image" "tag" "latest" $rs | quote }}
          pullPolicy: {{ dig "nicConfig" "image" "pullPolicy" "IfNotPresent" $rs }}

        securityContext:
          capabilities:
            add:
              - NET_ADMIN
              - NET_RAW

        command:
          - /bin/sh
          - -ec
          - |
            {{- range $interface := $configuredInterfaces }}
            {{- with $interface.config.mtu }}
            ip link set dev {{ $interface.name }} mtu {{ . }}
            {{- end }}
            {{- range $ring, $value := $interface.config.rings }}
            ethtool -G {{ $interface.name }} {{ $ring }} {{ $value }}
            {{- end }}
            {{- range $feature, $value := $interface.config.offload }}
            ethtool -K {{ $interface.name }} {{ $feature }} {{ $value }}
            {{- end }}
            {{- range $route := dig "ipam" "routes" (list) $interface.config }}
            {{- with $route.src }}
            ip route replace {{ required (printf "%s route: dst is required when src is set" $interface.name) $route.dst }}{{ with $route.gw }} via {{ . }}{{ end }} dev {{ $interface.name }} src {{ . }}
            {{- end }}
            {{- end }}
            ip -d link show {{ $interface.name }}
            {{- end }}
      {{- if $qdiscInterfaces }}
      qdisc-config:
        image:
          repository: {{ dig "nicConfig" "image" "repository" "nicolaka/netshoot" $rs }}
          tag: {{ dig "nicConfig" "image" "tag" "latest" $rs | quote }}
          pullPolicy: {{ dig "nicConfig" "image" "pullPolicy" "IfNotPresent" $rs }}
        securityContext:
          capabilities:
            add:
              - NET_ADMIN
        command:
          - /bin/sh
          - -ec
          - |
            {{- range $interface := $qdiscInterfaces }}
            {{- $qdisc := default "fq" $interface.config.qdisc }}
            tc qdisc del dev {{ $interface.name }} root 2>/dev/null || true
            tc qdisc add dev {{ $interface.name }} root{{ with $interface.config.qdiscHandle }} handle {{ . }}{{ end }} {{ $qdisc }}{{ with $interface.config.bandwidth }}{{ if ne $qdisc "htb" }} {{ if eq $qdisc "cake" }}bandwidth{{ else }}maxrate{{ end }} {{ . }}{{ end }}{{ end }}{{ with $interface.config.qdiscOptions }} {{ . }}{{ end }}
            {{- range $classIndex, $class := $interface.config.classes }}
            tc class add dev {{ $interface.name }} parent {{ required (printf "%s classes[%d].parent is required" $interface.name $classIndex) $class.parent }} classid {{ required (printf "%s classes[%d].classid is required" $interface.name $classIndex) $class.classid }} {{ default $qdisc $class.qdisc }}{{ with $class.rate }} rate {{ . }}{{ end }}{{ with $class.ceil }} ceil {{ . }}{{ end }}{{ with $class.options }} {{ . }}{{ end }}
            {{- with $class.child }}
            tc qdisc add dev {{ $interface.name }} parent {{ $class.classid }}{{ with .handle }} handle {{ . }}{{ end }} {{ default "fq" .qdisc }}{{ with .bandwidth }} {{ if eq (default "fq" .qdisc) "cake" }}bandwidth{{ else }}maxrate{{ end }} {{ . }}{{ end }}{{ with .options }} {{ . }}{{ end }}
            {{- end }}
            {{- end }}
            {{- range $queueIndex, $queue := $interface.config.priorityQueues }}
            {{- if $queue.classid }}
            tc class add dev {{ $interface.name }} parent {{ required (printf "%s priorityQueues[%d].parent is required" $interface.name $queueIndex) $queue.parent }} classid {{ $queue.classid }} {{ default $qdisc $queue.classQdisc }}{{ with $queue.rate }} rate {{ . }}{{ end }}{{ with $queue.ceil }} ceil {{ . }}{{ end }}{{ with $queue.burst }} burst {{ . }}{{ end }}{{ with $queue.cburst }} cburst {{ . }}{{ end }}{{ with $queue.classOptions }} {{ . }}{{ end }}
            tc qdisc add dev {{ $interface.name }} parent {{ $queue.classid }}{{ with $queue.handle }} handle {{ . }}{{ end }} {{ default "fq" $queue.qdisc }}{{ with $queue.bandwidth }} {{ if eq (default "fq" $queue.qdisc) "cake" }}bandwidth{{ else }}maxrate{{ end }} {{ . }}{{ end }}{{ with $queue.options }} {{ . }}{{ end }}
            {{- else }}
            tc qdisc add dev {{ $interface.name }} parent {{ required (printf "%s priorityQueues[%d].parent is required" $interface.name $queueIndex) $queue.parent }}{{ with $queue.handle }} handle {{ . }}{{ end }} {{ default "fq" $queue.qdisc }}{{ with $queue.bandwidth }} {{ if eq (default "fq" $queue.qdisc) "cake" }}bandwidth{{ else }}maxrate{{ end }} {{ . }}{{ end }}{{ with $queue.options }} {{ . }}{{ end }}
            {{- end }}
            {{- end }}
            {{- range $ruleIndex, $rule := default (default (list) $interface.config.filters) $interface.config.trafficRules }}
            {{- $ruleContext := printf "%s trafficRules[%d]" $interface.name $ruleIndex }}
            {{- $classifier := default "flower" $rule.classifier }}
            {{- if ne $classifier "flower" }}
            {{- fail (printf "%s: unsupported classifier %q" $ruleContext $classifier) }}
            {{- end }}
            {{- $match := default (dict) $rule.match }}
            {{- $tosConfigured := or (hasKey $match "dscp") (hasKey $match "ecn") }}
            {{- $tosValue := 0 }}
            {{- $tosMask := 0 }}
            {{- if hasKey $match "dscp" }}
            {{- $dscp := int $match.dscp }}
            {{- if or (lt $dscp 0) (gt $dscp 63) }}{{- fail (printf "%s: match.dscp must be from 0 through 63" $ruleContext) }}{{- end }}
            {{- $tosValue = mul $dscp 4 }}
            {{- $tosMask = 252 }}
            {{- end }}
            {{- if hasKey $match "ecn" }}
            {{- $ecn := int $match.ecn }}
            {{- if or (lt $ecn 0) (gt $ecn 3) }}{{- fail (printf "%s: match.ecn must be from 0 through 3" $ruleContext) }}{{- end }}
            {{- $tosValue = add $tosValue $ecn }}
            {{- $tosMask = add $tosMask 3 }}
            {{- end }}
            {{- $flowid := default (default $rule.classid $rule.classId) $rule.flowid }}
            {{- with $tierName := $rule.tier }}
            {{- range $queue := $interface.config.priorityQueues }}
            {{- if eq (default "" $queue.name) $tierName }}
            {{- $flowid = required (printf "%s: priority queue %q needs classid" $ruleContext $tierName) $queue.classid }}
            {{- end }}
            {{- end }}
            {{- if not $flowid }}{{- fail (printf "%s: tier %q does not name a priorityQueue" $ruleContext $tierName) }}{{- end }}
            {{- end }}
            tc filter add dev {{ $interface.name }} parent {{ required (printf "%s: parent is required" $ruleContext) $rule.parent }} protocol {{ required (printf "%s: protocol is required" $ruleContext) $rule.protocol }} pref {{ required (printf "%s: priority is required" $ruleContext) $rule.priority }}{{ with $rule.handle }} handle {{ . }}{{ end }} {{ $classifier }}{{ if or $rule.skipHw $rule.skip_hw }} skip_hw{{ end }}{{ if or $rule.skipSw $rule.skip_sw }} skip_sw{{ end }}{{ with (default $match.sourceMac $match.srcMac) }} src_mac {{ . }}{{ end }}{{ with (default $match.destinationMac $match.dstMac) }} dst_mac {{ . }}{{ end }}{{ with (default $match.sourceIp $match.srcIp) }} src_ip {{ . }}{{ end }}{{ with (default $match.destinationIp $match.dstIp) }} dst_ip {{ . }}{{ end }}{{ with $match.ipProtocol }} ip_proto {{ . }}{{ end }}{{ with (default $match.sourcePort $match.srcPort) }} src_port {{ . }}{{ end }}{{ with (default $match.destinationPort $match.dstPort) }} dst_port {{ . }}{{ end }}{{ if $tosConfigured }} ip_tos {{ printf "0x%02x/0x%02x" $tosValue $tosMask }}{{ end }}{{ with (default $match.vlanPcp $match.vlanPriority) }} vlan_prio {{ . }}{{ end }}{{ with $match.vlanId }} vlan_id {{ . }}{{ end }}{{ with (default $match.firewallMark $match.mark) }} skbmark {{ . }}{{ end }}{{ with $match.raw }} {{ . }}{{ end }}{{ with $flowid }} flowid {{ . }}{{ end }}{{ if $rule.drop }} action drop{{ end }}{{ with $rule.rawActions }} {{ . }}{{ end }}
            {{- end }}
            {{- end }}
      {{- end }}
    {{- end }}



    pod:
      dnsPolicy: None

      automountServiceAccountToken: false

      hostname: '{{ $name }}-routeserver'
      
      {{- with (dig "pod" "labels" dict $rs) }}
      labels:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with $rs.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      dnsConfig:
        nameservers:
          - 1.1.1.1
        options:
          - name: ndots
            value: '0'
          - name: edns0

      {{- if and $rs.networking $rs.networking.interfaces }}
      {{- $additionalNetworks := list }}
      {{- range $netID, $netInterface := $rs.networking.interfaces }}
      {{- if gt $netID 0 }}
      {{- $network := dict "name" (printf "net-%s-%s-%d" $.Release.Name $name $netID) "interface" (printf "eth%d" $netID) }}
      {{- with $netInterface.macAddress }}
      {{- $_ := set $network "mac" . }}
      {{- end }}
      {{- $additionalNetworks = append $additionalNetworks $network }}
      {{- end }}
      {{- end }}
      annotations:
        v1.multus-cni.io/default-network: '{{ $.Release.Namespace }}/net-{{ $.Release.Name }}-{{ $name }}-0'
        {{- if $additionalNetworks }}
        k8s.v1.cni.cncf.io/networks: {{ $additionalNetworks | toJson | quote }}
        {{- end }}
      {{- end }}

    containers:
      frr:
        image:
          repository: quay.io/frrouting/frr
          #
          # TODO: Get Renovate or similar managing this
          #
          tag: {{ if and $rs.frr $rs.frr.version }}{{ $rs.frr.version }}{{ else }}{{ $.Values.frr.defaultVersion }}{{ end }}
          pullPolicy: IfNotPresent

        {{- if $sriovUsed }}
        resources:
          limits:
            {{- range $device, $count := $sriovResources }}
            {{ $device }}: {{ $count | quote }}
            {{- end }}
        {{- end }}

        securityContext:
          privileged: false
          allowPrivilegeEscalation: false
          runAsNonRoot: false
          readOnlyRootFilesystem: false
          {{- if or (dig "ospf" "enabled" false $rs) (dig "ospf6" "enabled" false $rs) (dig "isis" "enabled" false $rs) }}
          capabilities:
            add:
              - NET_ADMIN
              - NET_RAW
              - SYS_ADMIN
              - NET_BIND_SERVICE
          {{- end }}
          seccompProfile:
            type: "RuntimeDefault"

        # -- Probe configuration
        # -- [[ref]](https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/)
        # @default -- See below
        probes:
          # -- Liveness probe configuration
          # @default -- See below
          liveness:
            # -- Enable the liveness probe
            enabled: false
            # -- Set this to `true` if you wish to specify your own livenessProbe
            custom: false
            # -- sets the probe type when not using a custom probe
            # @default -- "TCP"
            type: TCP
            # -- The spec field contains the values for the default livenessProbe.
            # If you selected `custom: true`, this field holds the definition of the livenessProbe.
            # @default -- See below
            spec:
              initialDelaySeconds: 0
              periodSeconds: 10
              timeoutSeconds: 1
              failureThreshold: 3

          # -- Redainess probe configuration
          # @default -- See below
          readiness:
            # -- Enable the readiness probe
            enabled: false
            # -- Set this to `true` if you wish to specify your own readinessProbe
            custom: false
            # -- sets the probe type when not using a custom probe
            # @default -- "TCP"
            type: TCP
            # -- The spec field contains the values for the default readinessProbe.
            # If you selected `custom: true`, this field holds the definition of the readinessProbe.
            # @default -- See below
            spec:
              initialDelaySeconds: 0
              periodSeconds: 10
              timeoutSeconds: 1
              failureThreshold: 3

          # -- Startup probe configuration
          # @default -- See below
          startup:
            # -- Enable the startup probe
            enabled: false
            # -- Set this to `true` if you wish to specify your own startupProbe
            custom: false
            # -- sets the probe type when not using a custom probe
            # @default -- "TCP"
            type: TCP
            # -- The spec field contains the values for the default startupProbe.
            # If you selected `custom: true`, this field holds the definition of the startupProbe.
            # @default -- See below
            spec:
              initialDelaySeconds: 0
              timeoutSeconds: 1
              ## This means it has a maximum of 5*30=150 seconds to start up before it fails
              periodSeconds: 5
              failureThreshold: 30

      {{- if dig "debugSidecar" "enabled" false $rs }}
      netshoot:
        image:
          repository: {{ dig "debugSidecar" "image" "repository" "nicolaka/netshoot" $rs }}
          tag: {{ dig "debugSidecar" "image" "tag" "latest" $rs | quote }}
          pullPolicy: {{ dig "debugSidecar" "image" "pullPolicy" "IfNotPresent" $rs }}

        command:
          {{- toYaml (dig "debugSidecar" "command" (list "/bin/sh" "-c") $rs) | nindent 10 }}
        args:
          {{- toYaml (dig "debugSidecar" "args" (list "sleep infinity") $rs) | nindent 10 }}

        {{- with $rs.debugSidecar.env }}
        env:
          {{- toYaml . | nindent 10 }}
        {{- end }}

        {{- with $rs.debugSidecar.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}

        securityContext:
          {{- toYaml (dig "debugSidecar" "securityContext" (dict
            "allowPrivilegeEscalation" false
            "privileged" false
            "readOnlyRootFilesystem" false
            "runAsNonRoot" false
            "seccompProfile" (dict "type" "RuntimeDefault")
          ) $rs) | nindent 10 }}
      {{- end }}

{{- end }}


service:
  {{- range $name, $rs := .Values.routeservers }}
  {{ $name }}-bgp:
    # -- Enables or disables the service
    enabled: true

    # -- Configure which controller this service should target
    controller: {{ $name }}-routeserver

    # -- Make this the primary service for this controller (used in probes, notes, etc...).
    # If there is more than 1 service targeting the controller, make sure that only 1 service is
    # marked as primary.
    primary: false

    # -- Set the service type
    type: LoadBalancer

    # -- Specify the externalTrafficPolicy for the service. Options: Cluster, Local
    # -- [[ref](https://kubernetes.io/docs/tutorials/services/source-ip/)]
    externalTrafficPolicy:

    # -- Specify the ip policy. Options: SingleStack, PreferDualStack, RequireDualStack
    ipFamilyPolicy:
    # -- The ip families that should be used. Options: IPv4, IPv6
    ipFamilies: []

    # # -- Provide additional annotations which may be required.
    annotations:
      purelb.io/allow-local: 'true'
      purelb.io/addresses: '{{ $rs.ipAddress }}'

    # -- Allow adding additional match labels
    extraSelectorLabels: {}

    ports:
      turn-tcp:
        # -- Enables or disables the port
        enabled: true

        # -- Make this the primary port (used in probes, notes, etc...)
        # If there is more than 1 service, make sure that only 1 port is marked as primary.
        primary: false

        # -- The port number
        port: 179

        # -- Port protocol.
        # Support values are `HTTP`, `HTTPS`, `TCP` and `UDP`.
        # HTTP and HTTPS spawn a TCP service and get used for internal URL and name generation
        protocol: TCP

        # -- Specify the appProtocol value for the Service.
        # [[ref]](https://kubernetes.io/docs/concepts/services-networking/service/#application-protocol)
        appProtocol:
  {{- end }}

configMaps:
configMaps:
{{- range $name, $rs := .Values.routeservers }}
  {{ $name }}-config:
    enabled: true

    data:
      daemons: |
        bgpd={{ if and $rs.bgp $rs.bgp.enabled }}{{ $rs.bgp.enabled }}{{ else }}false{{ end }}
        ospfd={{ dig "ospf" "enabled" false $rs }}
        ospf6d={{ dig "ospf6" "enabled" false $rs }}
        ripd=no
        ripngd=no
        isisd={{ dig "isis" "enabled" false $rs }}
        pimd=no
        ldpd=no
        nhrpd=no
        eigrpd=no
        babeld=no
        sharpd=no
        pbrd=no
        bfdd=no
        fabricd=no
        vrrpd=no
        pathd=no

        #
        # If this option is set the /etc/init.d/frr script automatically loads
        # the config via "vtysh -b" when the servers are started.
        # Check /etc/pam.d/frr if you intend to use "vtysh"!
        #
        vtysh_enable=yes
        zebra_options="  -A 127.0.0.1 -s 90000000"
        bgpd_options="--no_kernel --v6-with-v4-nexthops --skip_runas -A 127.0.0.1"
        ospfd_options="  -A 127.0.0.1"
        ospf6d_options=" -A ::1"
        ripd_options="   -A 127.0.0.1"
        ripngd_options=" -A ::1"
        isisd_options="  -A 127.0.0.1"
        pimd_options="   -A 127.0.0.1"
        ldpd_options="   -A 127.0.0.1"
        nhrpd_options="  -A 127.0.0.1"
        eigrpd_options=" -A 127.0.0.1"
        babeld_options=" -A 127.0.0.1"
        sharpd_options=" -A 127.0.0.1"
        pbrd_options="   -A 127.0.0.1"
        staticd_options="-A 127.0.0.1"
        bfdd_options="   -A 127.0.0.1"
        fabricd_options="-A 127.0.0.1"
        vrrpd_options="  -A 127.0.0.1"
        pathd_options="  -A 127.0.0.1"
        frr_profile="datacenter"
        MAX_FDS=1024
      vtysh.conf: |
        service integrated-vtysh-config
      frr.conf: |
        log syslog informational
        !
        debug bgp neighbor-events
        !
        ip nht resolve-via-default
        !
        router-id {{ $rs.ipAddress }}
        !
        {{- range $prefixList := ($rs.prefixLists.ipv4 | default list) }}
        {{- range $entry := ($prefixList.prefixes | default list) }}
        ip prefix-list {{ required "prefix-list name is required" $prefixList.name }} seq {{ required (printf "seqNum is required for prefix-list %s" $prefixList.name) $entry.seqNum }} {{ default "permit" $entry.action }} {{ required (printf "prefix is required for prefix-list %s" $prefixList.name) $entry.prefix }}{{- with $entry.ge }} ge {{ . }}{{- end }}{{- with $entry.le }} le {{ . }}{{- end }}
        {{- end }}
        {{- end }}
        !
        {{- range $routeMap := ($rs.routeMaps | default list) }}
        {{- $routeMapName := required "route-map name is required" $routeMap.name }}
        {{- range $entry := ($routeMap.entries | default list) }}
        route-map {{ $routeMapName }} {{ default "permit" $entry.action }} {{ required (printf "seqNum is required for route-map %s" $routeMapName) $entry.seqNum }}
        {{- with $entry.match }}
        {{- with .ipv4PrefixList }}
         match ip address prefix-list {{ . }}
        {{- end }}
        {{- end }}
        exit
        !
        {{- end }}
        {{- end }}
        {{- range $netID, $netInterface := $rs.networking.interfaces }}
        {{- $interfaceBandwidth := default "" $netInterface.bandwidth }}
        {{- if or $netInterface.routing $interfaceBandwidth }}
        !
        interface eth{{ $netID }}
          {{- with $interfaceBandwidth }}
          bandwidth {{ include "routeserver.bandwidthMbps" . }}
          {{- end }}
          {{- with $ospf := $netInterface.routing.ospf }}
          {{- if not (and (hasKey $ospf "enabled") (not $ospf.enabled)) }}
          ip ospf area {{ default "0.0.0.0" $ospf.area }}
          ip ospf network {{ default "broadcast" $ospf.type }}
          {{- with $ospf.cost }}
          ip ospf cost {{ . }}
          {{- end }}
          {{- with $ospf.priority }}
          ip ospf priority {{ . }}
          {{- end }}
          {{- with $ospf.hello }}
          ip ospf hello-interval {{ . }}
          {{- end }}
          {{- with $ospf.dead }}
          ip ospf dead-interval {{ . }}
          {{- end }}
          {{- with $ospf.retransmit }}
          ip ospf retransmit-interval {{ . }}
          {{- end }}
          {{- with $ospf.transmitDelay }}
          ip ospf transmit-delay {{ . }}
          {{- end }}
          {{- if $ospf.mtuIgnore }}
          ip ospf mtu-ignore
          {{- end }}
          {{- if $ospf.passive }}
          ip ospf passive
          {{- end }}
          {{- with $ospf.rawConfig }}
          {{ . | nindent 10 }}
          {{- end }}
          {{- end }}
          {{- end }}
          {{- with $ospf6 := $netInterface.routing.ospf6 }}
          {{- if not (and (hasKey $ospf6 "enabled") (not $ospf6.enabled)) }}
          ipv6 ospf6 area {{ default "0.0.0.0" $ospf6.area }}
          ipv6 ospf6 network {{ default "broadcast" $ospf6.type }}
          {{- with $ospf6.cost }}
          ipv6 ospf6 cost {{ . }}
          {{- end }}
          {{- with $ospf6.priority }}
          ipv6 ospf6 priority {{ . }}
          {{- end }}
          {{- with $ospf6.hello }}
          ipv6 ospf6 hello-interval {{ . }}
          {{- end }}
          {{- with $ospf6.dead }}
          ipv6 ospf6 dead-interval {{ . }}
          {{- end }}
          {{- with $ospf6.retransmit }}
          ipv6 ospf6 retransmit-interval {{ . }}
          {{- end }}
          {{- with $ospf6.transmitDelay }}
          ipv6 ospf6 transmit-delay {{ . }}
          {{- end }}
          {{- with $ospf6.mtu }}
          ipv6 ospf6 ifmtu {{ . }}
          {{- end }}
          {{- if $ospf6.mtuIgnore }}
          ipv6 ospf6 mtu-ignore
          {{- end }}
          {{- if $ospf6.passive }}
          ipv6 ospf6 passive
          {{- end }}
          {{- with $ospf6.rawConfig }}
          {{ . | nindent 10 }}
          {{- end }}
          {{- end }}
          {{- end }}
          {{- with $isis := $netInterface.routing.isis }}
          {{- if not (and (hasKey $isis "enabled") (not $isis.enabled)) }}
          {{- if not (and (hasKey $isis "ipv4") (not $isis.ipv4)) }}
          ip router isis {{ default (dig "isis" "name" "CORE" $rs) $isis.name }}
          {{- end }}
          {{- if not (and (hasKey $isis "ipv6") (not $isis.ipv6)) }}
          ipv6 router isis {{ default (dig "isis" "name" "CORE" $rs) $isis.name }}
          {{- end }}
          isis network {{ default "point-to-point" $isis.type }}
          {{- with $isis.metric }}
          isis metric {{ . }}
          {{- end }}
          {{- if $isis.passive }}
          isis passive
          {{- end }}
          {{- with $isis.rawConfig }}
          {{ . | nindent 10 }}
          {{- end }}
          {{- end }}
          {{- end }}
        exit
        {{- end }}
        {{- end }}
        !
        {{- if and $rs.ospf $rs.ospf.enabled }}
        router ospf
          {{- with $gr := $rs.ospf.gracefulRestart }}
          {{- if $gr.enabled }}
          graceful-restart
          {{- end }}
          {{- end }}

          {{- with $rs.ospf.autocost.refBandwidth }}
          auto-cost reference-bandwidth {{ . }}
          {{- end }}
          {{- range $protocol := $rs.ospf.redistribute }}
          redistribute {{ $protocol }}
          {{- end }}
        exit
        !
        {{- end }}
        {{- if dig "ospf6" "enabled" false $rs }}
        router ospf6
          ospf6 router-id {{ $rs.ipAddress }}

          {{- with $gr := $rs.ospf6.gracefulRestart }}
          {{- if $gr.enabled }}
          graceful-restart
          {{- end }}
          {{- end }}

          {{- with $rs.ospf6.autocost.refBandwidth }}
          auto-cost reference-bandwidth {{ . }}
          {{- end }}
          {{- range $protocol := $rs.ospf6.redistribute }}
          redistribute {{ $protocol }}
          {{- end }}
        exit
        !
        {{- end }}
        {{- if dig "isis" "enabled" false $rs }}
        router isis {{ dig "isis" "name" "CORE" $rs }}
          net {{ required (printf "routeservers.%s.isis.net is required when IS-IS is enabled" $name) $rs.isis.net }}
          is-type {{ dig "isis" "level" "level-2-only" $rs }}
          {{- if dig "isis" "ipv4" true $rs }}
          address-family ipv4 unicast
          exit-address-family
          {{- end }}
          {{- if dig "isis" "ipv6" true $rs }}
          address-family ipv6 unicast
          exit-address-family
          {{- end }}
          {{- with $rs.isis.rawConfig }}
          {{ . | nindent 10 }}
          {{- end }}
        exit
        !
        {{- end }}
        router bgp {{ $rs.bgp.asn }}
          no bgp ebgp-requires-policy
          no bgp default ipv4-unicast
          bgp allow-martian-nexthop
          bgp graceful-restart
          bgp cluster-id {{ default $rs.ipAddress $rs.bgp.clusterId }}
          bgp disable-ebgp-connected-route-check
          no bgp hard-administrative-reset
          bgp bestpath peer-type multipath-relax
          bgp graceful-restart stalepath-time 300
          bgp graceful-restart preserve-fw-state
          bgp graceful-restart notification
          update-delay 60 30
          {{- range $peerGroupIndex, $peerGroup := $rs.bgp.peerGroups }}
          {{- $peerGroupName := required
              (printf "routeservers.%s.bgp.peerGroups[%d].name is required" $name $peerGroupIndex)
              $peerGroup.name
          }}
          neighbor {{ $peerGroup.name }} peer-group
          {{- with $peerGroup.ebgpmultihop }}
          neighbor {{ $peerGroup.name }} ebgp-multihop {{ . }}
          {{- end }}
          neighbor {{ $peerGroup.name }} remote-as {{ required
            (printf "routeservers.%s.bgp.peerGroups[%d].asn is required" $name $peerGroupIndex)
            $peerGroup.asn
          }}

          {{- with $timers := $peerGroup.timers }}
          {{- if or $timers.keepalive $timers.holdtime }}
          neighbor {{ $peerGroupName }} timers {{ required
                (printf "routeservers.%s.bgp.peerGroups[%d].timers.keepalive is required when holdtime is configured" $name $peerGroupIndex)
                $timers.keepalive
            }} {{ required
                (printf "routeservers.%s.bgp.peerGroups[%d].timers.holdtime is required when keepalive is configured" $name $peerGroupIndex)
                $timers.holdtime
            }}
          {{- end }}

          {{- with $timers.connect }}
          neighbor {{ $peerGroupName }} timers connect {{ . }}
          {{- end }}

          {{- with $timers.delayOpen }}
          neighbor {{ $peerGroupName }} timers delayopen {{ . }}
          {{- end }}

          {{- with $timers.advertisementInterval }}
          neighbor {{ $peerGroupName }} advertisement-interval {{ . }}
          {{- end }}
          {{- end }}
          {{- end }}

          {{- range $peerIndex, $peer := $rs.bgp.peers }}
          {{- with $peer.remoteASN }}
          neighbor {{ $peer.address }} remote-as {{ . }}
          {{- end }}

          {{- with $peer.ebgpmultihop }}
          neighbor {{ $peer.address }} ebgp-multihop {{ . }}
          {{- end }}

          {{- with $peer.peerGroup }}
          neighbor {{ $peer.address }} peer-group {{ . }}
          {{- end }}
          {{- end }}
          {{- $interfaceBgpPeers := list }}
          {{- range $netID, $netInterface := $rs.networking.interfaces }}
          {{- with $peer := $netInterface.routing.bgp }}
          {{- if not (and (hasKey $peer "enabled") (not $peer.enabled)) }}
          {{- $neighborID := default (printf "eth%d" $netID) $peer.address }}
          {{- $interfaceBgpPeers = append $interfaceBgpPeers (dict "id" $neighborID "interface" (not $peer.address) "config" $peer) }}
          neighbor {{ $neighborID }}{{ if not $peer.address }} interface{{ end }} remote-as {{ required (printf "routeservers.%s.networking.interfaces.%d.routing.bgp.asn is required" $name $netID) $peer.asn }}
          {{- with $peer.description }}
          neighbor {{ $neighborID }} description {{ . }}
          {{- end }}
          {{- with $peer.password }}
          neighbor {{ $neighborID }} password {{ . }}
          {{- end }}
          {{- with $peer.ebgpmultihop }}
          neighbor {{ $neighborID }} ebgp-multihop {{ . }}
          {{- end }}
          {{- end }}
          {{- end }}
          {{- end }}
          !
          {{- if $interfaceBgpPeers }}
          {{- range $peer := $interfaceBgpPeers }}
          {{- range $addressFamily := default (list "ipv4 unicast") $peer.config.addressFamilies }}
          address-family {{ $addressFamily }}
            neighbor {{ $peer.id }} activate
            {{- with $peer.config.routeMapIn }}
            neighbor {{ $peer.id }} route-map {{ . }} in
            {{- end }}
            {{- with $peer.config.routeMapOut }}
            neighbor {{ $peer.id }} route-map {{ . }} out
            {{- end }}
          exit-address-family
          !
          {{- end }}
          {{- end }}
          {{- end }}
          {{- range $afiIndex, $afi := $rs.bgp.afi }}
          {{- range $safiIndex, $safi := $afi }}
          address-family {{ $afiIndex }} {{ $safiIndex }}
            {{- range $safiKeyIndex, $safiKey := $safi }}
            {{- range $safiSubKeyIndex, $safiSubKey := $safiKey }}
            
            {{- if kindIs "map" $safiSubKey }}
            {{ $safiKeyIndex }} {{ $safiSubKey.name }} {{ $safiSubKey.action }} 
            {{- else }}
            {{ $safiKeyIndex }} {{ if eq $safiSubKeyIndex "base" }}{{ $safiSubKey }}{{ else }}{{ $safiSubKeyIndex }} {{ $safiSubKey }}{{ end }}

            {{- end }}
            {{- end }}
            {{- end }}
          exit-address-family
          !
          {{- end }}
          {{- end }}
        exit
        !
        {{- with $rs.frr.rawConfig }}
        {{ . | nindent 8 }}
        !
        {{- end }}
        end
{{- end }}

persistence:
  {{- range $name, $rs := .Values.routeservers }}
  {{ $name }}-config:
    enabled: true

    type: configMap

    name: '{{ include "bjw-s.common.lib.chart.names.fullname" $ }}-{{ $name }}-config'

    defaultMode: 0755

    advancedMounts:
      {{ $name }}-routeserver: # the controller with the "main" identifier
        frr: # the container with the "main" identifier
          - path: /etc/frr/frr.conf
            readOnly: true
            subPath: frr.conf

          - path: /etc/frr/vtysh.conf
            readonly: true
            subPath: vtysh.conf

          - path: /etc/frr/daemons
            readOnly: true
            subPath: daemons
  {{- end }}


{{- end -}}
{{- $_ := mergeOverwrite .Values (include "app-template.hardcodedValues" . | fromYaml) -}}

{{- $testingGlob := . -}}
{{- range $name, $rs := .Values.routeservers }}
{{- if and $rs.networking $rs.networking.egressGW $rs.networking.egressGW.enabled }}
{{- $controllerName := printf "%s-routeserver" $name }}
apiVersion: cilium.io/v2
kind: CiliumEgressGatewayPolicy
metadata:
  name: {{ include "bjw-s.common.lib.chart.names.fullname" $ }}-{{ $name }}-ext-traffic
    
spec:
  # Specify which pods should be subject to the current policy.
  # Multiple pod selectors can be specified.
  selectors:
    - podSelector:
        matchLabels:
          app.kubernetes.io/component: {{ $controllerName }}
          {{- include "bjw-s.common.lib.metadata.selectorLabels" $ | nindent 10 }}

  # Specify which destination CIDR(s) this policy applies to.
  # Multiple CIDRs can be specified.
  destinationCIDRs:
    - '0.0.0.0/0'

  # Configure the gateway node.
  egressGateway:
    # Specify which node should act as gateway for this policy.
    nodeSelector:
      matchLabels:
        kubernetes.io/os: linux

    # Specify the IP address used to SNAT traffic matched by the policy.
    # It must exist as an IP associated with a network interface on the instance.
    egressIP: 10.1.1.179
---
{{- end }}
{{- if and $rs.networking $rs.networking.interfaces }}
{{- range $netID, $netInterface := $rs.networking.interfaces }}
---
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: net-{{ $.Release.Name }}-{{ $name }}-{{ $netID }}


  {{- if eq $netInterface.type "sriov" }}
  annotations:
    k8s.v1.cni.cncf.io/resourceName: {{ $netInterface.sriov.device }}
  {{- end }}
spec:
  config: |
    {{- $plugin := dict "type" $netInterface.type "vlan" $netInterface.sriov.vlan }}
    {{- if eq $netInterface.type "sriov" }}
    {{- $_ := set $plugin "spoofchk" "off" }}
    {{- end }}
    {{- with $netInterface.mtu }}
    {{- $_ := set $plugin "mtu" . }}
    {{- end }}
    {{- if $netInterface.ipam }}
    {{- $ipam := dict "type" "static" }}
    {{- with $netInterface.ipam.routes }}
    {{- $routes := list }}
    {{- range $route := . }}
    {{- $routes = append $routes (omit $route "src") }}
    {{- end }}
    {{- $_ := set $ipam "routes" $routes }}
    {{- end }}
    {{- $addresses := list }}
    {{- range $address := default (list $netInterface.ipam.address) $netInterface.ipam.addresses }}
    {{- $addresses = append $addresses (dict "address" (required (printf "routeservers.%s.networking.interfaces.%d: each IPAM address is required" $name $netID) $address)) }}
    {{- end }}
    {{- $_ := set $ipam "addresses" $addresses }}
    {{- $_ := set $plugin "ipam" $ipam }}
    {{- end }}
    {{- $config := dict "cniVersion" "1.0.0" "name" (printf "vlan%v" $netInterface.sriov.vlan) }}
    {{- with $netInterface.tuning }}
    {{- $tuning := deepCopy . }}
    {{- $_ := set $tuning "type" "tuning" }}
    {{- $_ := set $config "plugins" (list $plugin $tuning) }}
    {{- else }}
    {{- $_ := merge $config $plugin }}
    {{- end }}
    {{ $config | toJson }}
---
{{- end }}
{{- end }}
{{- end }}
---


{{/* Render the templates */}}
{{ include "bjw-s.common.loader.generate" . }}

---
