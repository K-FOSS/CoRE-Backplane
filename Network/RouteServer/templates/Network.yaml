{{- range $name, $rs := .Values.routeservers }}
{{- if and $rs.networking $rs.networking.sriov $rs.networking.sriov $rs.networking.sriov.enabled }}
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: routeserver-{{ $name }}

  annotations:
    k8s.v1.cni.cncf.io/resourceName: {{ $rs.networking.sriov.device }}
spec:
  config: |
    {
      "cniVersion": "1.0.0",
      "name": "vlan{{ $rs.networking.sriov.vlan }}",
      "type": "sriov",
      "spoofchk": "off",
      "mtu": 1500,
      "vlan": {{ $rs.networking.sriov.vlan }},
      "ipam": {
        "type": "static",
        "routes": [
          { "dst": "0.0.0.0/0", "gw": "{{ $rs.networking.sriov.gateway }}" }
        ],
        "addresses": [
          {
            "address": "{{ $rs.networking.sriov.address }}",
            "gateway": "{{ $rs.networking.sriov.gateway }}"
          }
        ]
      }
    }
{{- end }}
{{- end }}