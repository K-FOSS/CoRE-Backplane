apiVersion: v1
kind: ConfigMap
metadata:
  name: sriovdp-config
  namespace: kube-system
data:
  config.json: |
    {
      "resourceList": [
        {
          "resourceName": "intel_i350_vfio",
          "selectors": {
            "vendors": ["8086"],
            "devices": ["1520"],
            "drivers": ["vfio-pci"],
            "pfNames": ["eno2"]
          }
        }
      ]
    }