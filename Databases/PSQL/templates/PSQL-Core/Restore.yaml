{{ if .Values.restore -}}
apiVersion: acid.zalan.do/v1
kind: postgresql
metadata:
  name: psql-main

  labels:
    wan-mode: public
    lan-mode: private

  annotations:
    acid.zalan.do/controller: '{{ .Values.psql.controllerID }}'

spec:
  teamId: core

  numberOfInstances: {{ include "psql.mylogin.space/replicas" $ }} 

  podPriorityClassName: 'tier2-priority'

  enableConnectionPooler: false

  allowedSourceRanges:
    - 0.0.0.0/0

  users:
    opsadmin:
      - superuser
      - createdb
      - LOGIN

  databases:
    ops: opsadmin

  postgresql:
    version: '16'

    parameters:
      max_connections: '8096'
      max_prepared_transactions: '1000'
      max_locks_per_transaction: '512'
      max_wal_size: '32GB'
      min_wal_size: '512MB'
      shared_buffers: '1024MB'
      work_mem: 5592kB
      effective_cache_size: 4022MB
      effective_io_concurrency: '200'
      maintenance_work_mem: 2047MB
      max_parallel_workers: '32'
      max_parallel_workers_per_gather: '16'

  volume:
    size: 25Gi

  resources:
    requests:
      cpu: '100m'
      memory: 1Gi

    limits:
      cpu: '4'
      memory: 8Gi

  patroni:
    failsafe_mode: true
    fsync: 'off'
    initdb:
      encoding: 'UTF8'
      locale: 'en_US.UTF-8'
      data-checksums: 'true'

    pg_hba:
      - local all         all                  trust
      - local replication standby              md5
      - host replication  replicator 0.0.0.0/0 md5
      - host replication  standby    0.0.0.0/0 md5

    ttl: 30

    loop_wait: 10

    retry_timeout: 10

    synchronous_mode: false

    synchronous_mode_strict: false

    synchronous_node_count: 1

    maximum_lag_on_failover: 33554432
    
  clone:
    cluster: "psql-main"
    timestamp: "2026-05-10T09:45:00-07:00"
{{ end }}