env: 'prod'

mongodb:
  service:
    anycast:
      enabled: true

psmdb-db:
  # Default values for psmdb-cluster.
  # This is a YAML-formatted file.
  # Declare variables to be passed into your templates.

  # Platform type: kubernetes, openshift
  platform: kubernetes

  # Cluster DNS Suffix
  clusterServiceDNSSuffix: svc.cluster.local
  # clusterServiceDNSMode: "Internal"

  finalizers:
  ## Set this if you want that operator deletes the primary pod last
    - percona.com/delete-psmdb-pods-in-order
  ## Set this if you want to delete database persistent volumes on cluster deletion
  #  - percona.com/delete-psmdb-pvc
  ## Set this if you want to delete all pitr chunks on cluster deletion
  #  - percona.com/delete-pitr-chunks

  nameOverride: ""
  fullnameOverride: ""

  annotations:
    argocd.argoproj.io/sync-wave: '10'

  crVersion: 1.19.1
  pause: false
  unmanaged: false

  unsafeFlags:
    tls: true
    replsetSize: true
    mongosSize: false
    terminationGracePeriod: false
    backupIfUnhealthy: false

  enableVolumeExpansion: false

  # ignoreAnnotations:
  #   - service.beta.kubernetes.io/aws-load-balancer-backend-protocol
  # ignoreLabels:
  #   - rack

  #
  # TODO: Setup mutlicluster MongoDB
  #
  multiCluster:
    enabled: false
    # DNSSuffix: svc.clusterset.local

  updateStrategy: SmartUpdate
  upgradeOptions:
    versionServiceEndpoint: https://check.percona.com
    apply: disabled
    schedule: "0 2 * * *"
    setFCV: false

  imagePullPolicy: Always

  tls:
    mode: disabled

  pmm:
    enabled: false
    image:
      repository: percona/pmm-client

    serverHost: monitoring-service


  replsets:
    rs0:
      name: rs0
      size: 3

      priorityClass: 'tier2-priority'

      expose:
        enabled: true
        type: ClusterIP

      volumeSpec:
        pvc:
          labels:
            resolvemy.host/env: 'prod'
          resources:
            requests:
              storage: 3Gi

      nonvoting:
        enabled: false

      arbiter:
        enabled: false
        size: 1


  sharding:
    enabled: false

    balancer:
      enabled: true

  backup:
    enabled: true
    storages:
      core-minio:
        type: s3
        s3:
          bucket: mongodb-backups
          credentialsSecret: core-home1-talos-prod-s3
          region: us-east-1
          endpointUrl: https://s3.mylogin.space

    pitr:
      enabled: false
      oplogOnly: false
    tasks:
      - name: daily-s3-minio
        enabled: true
        schedule: "0 0 * * *"
        keep: 3
        storageName: core-minio
        compressionType: gzip
